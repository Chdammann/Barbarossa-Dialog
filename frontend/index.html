<html lang="de">
<head>
<meta charset="UTF-8" />

<style>
  /* -----------------------------
     BODY & GRUNDLAYOUT
  ----------------------------- */
  body {
    margin: 0;
    overflow: hidden;
    background: black;
    font-family: "Georgia", serif;
    color: white;
    height: 100vh;

     CANVAS (Fullscreen-Hintergrund)
  ----------------------------- */

    position: fixed;
    inset: 0;

    background: #222;
    color: white;
    font-size: 32px;
    cursor: pointer;
    z-index: 10;

  #micBtn:hover { background: #444; }

  /* -----------------------------
     LOADING TEXT
  ----------------------------- */
  #loading {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    color: #ccc;
    font-size: 1.1em;
    text-align: center;
    z-index: 10;
  }

  /* -----------------------------
     FOOTER
  ----------------------------- */
  footer {
    position: fixed;
    bottom: 12px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 13px;
    color: rgba(255, 255, 255, 0.6);
    text-align: center;
    pointer-events: none;
    z-index: 10000;
  }
</style>

<script src="https://cdn.jsdelivr.net/npm/three@0.146.0/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.146.0/examples/js/loaders/GLTFLoader.js"></script>

<script>
console.log("SCRIPT START");
  
/* ==========================================
   MUSEUM STARTUP CLEANUP – SICHER & LOKAL
   ========================================== */


(function museumStartupCleanup() {
  try {
    console.log("[Museum] Startup cleanup begin");

    /* 1️⃣ Eigene Storage-Daten löschen */
    try {
      localStorage.clear();
      sessionStorage.clear();
      console.log("[Museum] localStorage & sessionStorage cleared");
    } catch (e) {
      console.warn("[Museum] Storage clear failed:", e);
    }

    /* 2️⃣ IndexedDB vollständig löschen (Speech / Media-Reste) */
    if (window.indexedDB && indexedDB.databases) {
      indexedDB.databases().then(dbs => {
        dbs.forEach(db => {
          if (db.name) {
            indexedDB.deleteDatabase(db.name);
            console.log("[Museum] IndexedDB deleted:", db.name);
          }
        });
      });
    }

    /* 3️⃣ Service Worker entfernen (falls jemals vorhanden) */
    if ("serviceWorker" in navigator) {
      navigator.serviceWorker.getRegistrations().then(regs => {
        regs.forEach(reg => {
          reg.unregister();
          console.log("[Museum] ServiceWorker unregistered");
        });
      });
    }

    /* 4️⃣ Harte Reset-Flags für Avatar-Logik */
    window.__MUSEUM_RESET__ = true;

    console.log("[Museum] Startup cleanup done");
  } catch (err) {
    console.error("[Museum] Startup cleanup error:", err);
  }
})();

/* ===============================
   STATE-DEFINITION + VARIABLEN
================================ */

// === VISEME-STATE ===
let visemeMesh = null;   // wird im GLTF-Loader gesetzt

// === Audio / Analyse (Reserve) ===
let audioCtx, analyser, src;

// === ZENTRALE ZUSTANDSMASCHINE ===
// Erlaubte Zustände:
// "sleep"   → Bildschirm war dunkel / gerade aufgeweckt
// "idle"    → wach, bereit
// "greet"   → Begrüßung läuft
// "listen"  → Aufnahme läuft
// "answer"  → Antwort läuft

let STATE = "idle";

// === Kern-Flags ===
let model = null;
let lastTranscript = "";
let greeted = false;
let talking = false;
let recRunning = false;
let runId = 0;          // 🔒 eindeutiger Durchlaufzähler
let listeningFinished = false;
let buttonLocked = false;
let mouthCooldown = false;
let greetTimeout = null;

// === Voice-Auswahl (GLOBAL) – plattformsicher (FIXED) ===
let englishVoice = null;
let germanVoice  = null;
let maleVoice    = null; // <- für speak()-Kompatibilität & Priorisierung

function loadVoices() {
  const voices = speechSynthesis.getVoices();
  if (!voices || !voices.length) return;

  const deVoices = voices.filter(v => (v.lang || "").toLowerCase().startsWith("de"));
  const enVoices = voices.filter(v => (v.lang || "").toLowerCase().startsWith("en"));

  // 🔹 DE: männlich bevorzugen (heuristisch über Name), dann Stefan, dann Google, dann irgendeine de
  maleVoice =
    deVoices.find(v => v.name && v.name.toLowerCase().includes("stefan")) ||
    deVoices.find(v => v.name && v.name.toLowerCase().includes("markus")) ||
    deVoices.find(v => v.name && v.name.toLowerCase().includes("männ")) ||
    null;

  germanVoice =
    maleVoice ||
    deVoices.find(v => v.name && v.name.toLowerCase().includes("stefan")) ||
    deVoices.find(v => v.name && v.name.toLowerCase().includes("google")) ||
    deVoices[0] ||
    null;

  // 🔹 EN: Google/David bevorzugen, sonst irgendeine en
  englishVoice =
    enVoices.find(v => v.name && v.name.toLowerCase().includes("google")) ||
    enVoices.find(v => v.name && v.name.toLowerCase().includes("david")) ||
    enVoices.find(v => (v.lang || "").toLowerCase() === "en-us") ||
    enVoices[0] ||
    null;

  console.log("🎤 Voices geladen:", {
    german: germanVoice ? `${germanVoice.name} (${germanVoice.lang})` : null,
    male:   maleVoice   ? `${maleVoice.name} (${maleVoice.lang})` : null,
    english: englishVoice ? `${englishVoice.name} (${englishVoice.lang})` : null
  });
}

// Stimmen werden oft asynchron nachgeladen
speechSynthesis.onvoiceschanged = loadVoices;

// Sofortiger Versuch, falls Stimmen schon da sind
loadVoices();
// === Bewegungszustände ===
let frontalFix = true;
let hmNeigen = false;
let rising = false;
let hmStartTime = 0;
let riseStartTime = 0;

// === Rückkehr in Ruhepose (nur am Ende!) ===
let toIdlePose = false;
let toIdleStart = 0;
const toIdleDuration = 3000;

// === Animationszeiten (ms) ===
const hmDuration = 8000;
const riseDuration = 3000;

// === Grundposition Avatar ===
let baseRotY = -0.35;
let baseRotX = 0.25;
let baseY = 0;

// === RESET ALLER BEWEGUNGEN (hart, eindeutig) ===
function resetMovements() {
  hmNeigen = false;
  rising = false;
  toIdlePose = false;
  talking = false;
}

  // ===============================
// HINT-FUNKTIONEN (TEXT EIN-/AUSBLENDEN)
// ===============================

function showHint(message) {
  const hintElement = document.getElementById("hint");
  if (!hintElement) {
    console.warn("Hint-Element nicht gefunden");
    return;
  }

  hintElement.innerText = message;
  hintElement.classList.add("visible");
}

function hideHint() {
  const hintElement = document.getElementById("hint");
  if (!hintElement) return;

  hintElement.classList.remove("visible");
}

/* -----------------------------
   THREE.js SETUP
----------------------------- */

const scene = new THREE.Scene();

const camera = new THREE.PerspectiveCamera(
  30,
  window.innerWidth / window.innerHeight,
  0.1,
  1000
);
camera.position.set(0, 0, 2.8);

const renderer = new THREE.WebGLRenderer({
  canvas: document.getElementById("avatarCanvas"),
  antialias: true
});
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(window.devicePixelRatio);
renderer.setClearColor(0x000000);

/* -----------------------------
   LICHT
----------------------------- */


const dirLight = new THREE.DirectionalLight(0xffffff, 2);
dirLight.position.set(1, 1, 2);
scene.add(dirLight);

const ambLight = new THREE.AmbientLight(0xffffff, 0.8);
scene.add(ambLight);

const frontLight = new THREE.PointLight(0xffffff, 0.8);
frontLight.position.set(0, 0.5, 2);
scene.add(frontLight);

/* -----------------------------
   MODEL + VISEME
----------------------------- */

// globale Referenz (State-Machine nutzt sie)
visemeMesh = null;

// feste Indizes aus Blender
const visemeIndex = {
  A: 0,
  E: 1,
  O: 2,
  U: 3,
  M: 4
};

const loader = new THREE.GLTFLoader();
loader.load("./avatar.glb", gltf => {

  model = gltf.scene;
  scene.add(model);

  // Viseme-Mesh finden
  visemeMesh = null;
  model.traverse(obj => {
    if ((obj.isMesh || obj.isSkinnedMesh) && obj.morphTargetDictionary) {
      console.log("✔ Viseme-Träger gefunden:", obj.name, obj.morphTargetDictionary);
      if (!visemeMesh) visemeMesh = obj;
    }
  });

  if (!visemeMesh) {
    console.error("❌ KEIN Viseme-Mesh gefunden – GLB prüfen!");
  }

  // Ladeanzeige aus
  const loadingEl = document.getElementById("loading");
  if (loadingEl) loadingEl.style.display = "none";

  // Animation exakt einmal starten
  animate();
});

/* -----------------------------
   VISEME – NIEDRIGE EBENE
   (keine Logik, kein State)
----------------------------- */
function setViseme(key, value) {
  if (!visemeMesh || !visemeMesh.morphTargetInfluences) return;

  const idx = visemeIndex[key];
  if (idx === undefined) return;

  // alle schließen
  visemeMesh.morphTargetInfluences.fill(0);

  // Ziel setzen
  visemeMesh.morphTargetInfluences[idx] = value;
}

// ====================================
// ANIMATE – FINAL & STABIL (VISEME-KLON)
// ====================================
function animate() {
  requestAnimationFrame(animate);
  if (!model) return;

  const now = performance.now();
  const frontalY = -Math.PI / 2;
  const rightY   = baseRotY - Math.PI / 2;
  const leftY    = frontalY + 0.25;

  /* ===============================
     🛑 MOUTH-COOLDOWN (HÖCHSTE PRIORITÄT)
     → verhindert Nachklappern
  =============================== */
  if (mouthCooldown) {
    setViseme("M", 0);
  }

  /* ===============================
     🧊 Mund neutral, wenn nicht gesprochen wird
     (NUR wenn KEIN Cooldown aktiv)
  =============================== */
  if (!mouthCooldown && !talking && STATE !== "think") {
    setViseme("M", 0);
  }

  /* ===============================
     THINK-PHASE → HMMM / NEIGEN
     (HÖCHSTE PRIORITÄT FÜR KOPF)
  =============================== */
  if (STATE === "think" && hmNeigen) {
    model.rotation.x = THREE.MathUtils.lerp(
      model.rotation.x,
      baseRotX + 0.25,
      0.04
    );
    model.rotation.y = THREE.MathUtils.lerp(
      model.rotation.y,
      leftY,
      0.04
    );

    renderer.render(scene, camera);
    return; // ⛔ nichts darf darüber hinwegzeichnen
  }

  /* ===============================
     GREET / ANSWER → FRONTAL
  =============================== */
  if (rising) {
    model.rotation.y = THREE.MathUtils.lerp(model.rotation.y, frontalY, 0.06);
    model.rotation.x = THREE.MathUtils.lerp(model.rotation.x, 0, 0.06);
  }

  /* ===============================
     TALKING / LISTEN
  =============================== */
  else if (talking || STATE === "listen" || STATE === "greet") {
    model.position.y = baseY + Math.sin(now * 0.0015) * 0.008;
    model.rotation.y = THREE.MathUtils.lerp(model.rotation.y, frontalY, 0.03);
    model.rotation.x = THREE.MathUtils.lerp(model.rotation.x, 0, 0.03);
  }

  /* ===============================
     IDLE → SANFT NACH RECHTS
     + 🫁 ATEM (KOPF / BODY)
  =============================== */
  else if (STATE === "idle" && !recRunning && !talking) {

    // 🫁 sehr langsame Atembewegung (hoch / runter)
    const breath = Math.sin(now * 0.0019) * 0.006; // ~ ±2 mm

    model.position.y = baseY + breath;
    model.rotation.y = THREE.MathUtils.lerp(model.rotation.y, rightY, 0.03);
    model.rotation.x = THREE.MathUtils.lerp(model.rotation.x, baseRotX, 0.03);
  }

  /* ===============================
     DRIFT (NUR WENN NICHT THINK)
  =============================== */
  if (STATE !== "think") {
    const driftX = Math.sin(now * 0.0004) * 0.015;
    const driftY = Math.sin(now * 0.0003) * 0.012;

    model.rotation.x = THREE.MathUtils.lerp(
      model.rotation.x,
      baseRotX + driftX,
      0.02
    );

    const baseYaw = (STATE === "idle") ? rightY : frontalY;
    model.rotation.y = THREE.MathUtils.lerp(
      model.rotation.y,
      baseYaw + driftY,
      0.02
    );
  }

  renderer.render(scene, camera);
}


/* -----------------------------
   STATE MACHINE – RECOGNITION
   MIT THINK-PHASE (WAKE-SICHER) – FIXED
----------------------------- */

let recognition = null;
let heardSomething = false;
let detectedLanguage = "de";  // Sprache der letzten Eingabe

// interne Sicherungen gegen Chrome-Edgecases
let _recHandlersBound = false;
let _recSessionId = 0; // verhindert "late onend" von alten Sessions

/* -----------------------------
   SpeechRecognition verfügbar?
----------------------------- */
function getSpeechRecognitionCtor() {
  return window.SpeechRecognition || window.webkitSpeechRecognition || null;
}

/* -----------------------------
   Recognition robust bereitstellen (lazy init)
----------------------------- */
function ensureRecognition() {
  const SR = getSpeechRecognitionCtor();
  if (!SR) return null;

  // Wenn recognition fehlt (z.B. nach museumReset), neu erstellen
  if (!recognition) {
    recognition = new SR();
    recognition.continuous = false;
    recognition.interimResults = false;
    _recHandlersBound = false; // neue Instanz -> Handler neu binden
  }

  // Handler nur einmal pro Instanz binden
  if (!_recHandlersBound) {
    _recHandlersBound = true;

    recognition.onresult = (e) => {
      // Nur während listen auswerten
      if (STATE !== "listen") return;

      const res = e?.results?.[0]?.[0]?.transcript;
      if (!res || res.trim().length < 2) return;

      lastTranscript = res;
      detectedLanguage = detectLanguage(res); // Sprache erkennen
      heardSomething = true;
    };

    recognition.onerror = (e) => {
      // Desktop Chrome: errors sind häufig (no-speech, aborted, network)
      // Wir lassen onend den State sauber abwickeln.
      // Optionales Logging:
      try { console.warn("🎙️ recognition.onerror:", e?.error || e); } catch {}
    };

    recognition.onend = () => {
      // Session-Guard: Falls ein altes onend reinflattert, ignorieren
      const sessionIdAtEnd = _recSessionId;

      // recRunning immer runtersetzen
      recRunning = false;

      // Wenn wir nicht mehr im listen-State sind: nichts tun
      if (STATE !== "listen") return;

      // Wenn während eines Restarts eine neue Session gestartet wurde,
      // kann ein altes onend trotzdem kommen. Dann raus.
      // (Wir prüfen hier "sessionIdAtEnd" nicht direkt gegen live,
      // weil onend keinen parameter hat; stattdessen arbeiten wir
      // mit einer Start/Stop-Policy unten. Das hier bleibt defensiv.)
      // -> Kein zusätzlicher Code nötig; die Logik unten verhindert Doppelläufe.

      // Nichts gehört? -> zurück zu idle
      if (!heardSomething || !lastTranscript) {
        STATE = "idle";
        return;
      }

      /* ===============================
         THINK-PHASE
      =============================== */
      STATE = "think";
      resetMovements();

      // Think-Bewegung einen Frame verzögert setzen
      requestAnimationFrame(() => {
        hmNeigen = true;
        hmStartTime = performance.now();
      });

      // Denkphrase
      speak("Ähm … einen Moment bitte.", true);

      /* ===============================
         FRAGE → SERVER → ANTWORT
         (erst NACH Think-Phase)
      =============================== */
      fetch("/ask", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          text: lastTranscript,
          lang: detectedLanguage
        })
      })
      .then(r => r.json())
      .then(data => {
        const waitForThinkEnd = setInterval(() => {
          if (!talking) {
            clearInterval(waitForThinkEnd);

            STATE = "answer";
            resetMovements();

            rising = true;
            riseStartTime = performance.now();

            // Antwort in erkannter Sprache – forceLang übergeben
            speak(data.answer, false, detectedLanguage);
          }
        }, 120);
      })
      .catch(() => {
        STATE = "answer";
        resetMovements();
        speak(
          "Verzeiht, ich habe Euch nicht recht verstanden.",
          false,
          detectedLanguage
        );
      });
    };
  }

  return recognition;
}

/* -----------------------------
   Recognition starten (vor jedem Listen-Versuch) – FIXED
----------------------------- */
function startRecognition() {
  const r = ensureRecognition();
  if (!r) {
    try { console.warn("🛑 SpeechRecognition nicht verfügbar."); } catch {}
    recRunning = false;
    return;
  }

  // Sprache für das Listening setzen (nur de/en, wie bei dir)
  r.lang = (detectedLanguage === "en") ? "en-US" : "de-DE";

  // Session-ID erhöhen: markiert neuen Run (hilft bei Debug & Guards)
  _recSessionId++;

  heardSomething = false;

  // Wenn schon "running": sauber stoppen/abbrechen, dann neu starten
  if (recRunning) {
    try { r.abort(); } catch (e) {}
    recRunning = false;
  }

  // Start robust (Chrome wirft, wenn start() zu schnell hintereinander kommt)
  recRunning = true;
  try {
    r.start();
  } catch (e) {
    // Fallback: kurzer Delay und nochmal versuchen (einmalig)
    recRunning = false;
    try { console.warn("🛑 Recognition start() fehlgeschlagen, retry…", e); } catch {}

    setTimeout(() => {
      // Wenn inzwischen nicht mehr listen: nicht starten
      if (STATE !== "listen") return;

      const rr = ensureRecognition();
      if (!rr) return;

      rr.lang = (detectedLanguage === "en") ? "en-US" : "de-DE";
      heardSomething = false;
      recRunning = true;

      try {
        rr.start();
      } catch (e2) {
        recRunning = false;
        try { console.warn("🛑 Recognition retry start() fehlgeschlagen:", e2); } catch {}
      }
    }, 250);
  }
}
/* -----------------------------
   BUTTON + ENTER – GREET & LISTEN
   STABIL + MUSEUM-ABSICHERUNG – FIXED (VOICE WARMUP + SAFE FALLBACKS)
----------------------------- */

const micBtn = document.getElementById("micBtn");

// verhindert Mehrfach-Bindung
if (!window._interactionBound) {
  window._interactionBound = true;

  micBtn.onclick = startInteraction;

  // Enter im Capture-Mode → kann nicht geschluckt werden
  document.addEventListener("keydown", (e) => {
    if (e.key !== "Enter") return;
    e.preventDefault();
    e.stopPropagation();
    startInteraction();
  }, true);
}

function startInteraction() {

  // 🛡️ Nur definierte Zustände erlauben
  if (STATE !== "idle" && STATE !== "greet") return;

  // 🛡️ Keine parallelen Aktionen
  if (talking || recRunning) return;

  // 🔒 Doppelklick-Schutz / Tasterprellen
  if (buttonLocked) return;
  buttonLocked = true;
  setTimeout(() => buttonLocked = false, 400);

  /* ===============================
       1️⃣ IDLE → GREET
  =============================== */
  if (STATE === "idle" && !greeted) {

    // 🎤 Voice-Warmup: wenn Stimmen noch nicht da sind, kurzen Tick warten
    // (verhindert "erste Begrüßung nimmt Default/female Voice")
    try {
      const voicesReady = speechSynthesis.getVoices && speechSynthesis.getVoices().length > 0;
      if (!voicesReady) {
        setTimeout(() => startInteraction(), 150);
        return;
      }
    } catch (e) {}

    greeted = true;
    STATE = "greet";

    resetMovements();

    frontalFix = false;
    rising = true;
    riseStartTime = performance.now();

    // alte Recognition sauber abbrechen
    try { recognition?.abort(); } catch(e) {}
    recRunning = false;
    listeningFinished = false;

    speak(
      "Seid gegrüßt, mein Freund. Ich bin Friedrich Barbarossa, nach fast neunhundert Jahren im Kaiserberg zu Lautern erwacht. Was ist Euer Begehr? If ju wonnt, spiek inglisch.",
      false,
      "de",
      () => { showHint("Kurz Knopf drücken, dann fragen"); }
    );

    // Auto-Reset nach 2 Minuten
    if (greetTimeout) clearTimeout(greetTimeout);
    greetTimeout = setTimeout(() => {

      if (STATE === "greet" && !recRunning && !talking) {

        console.log("⏳ Begrüßung ohne Reaktion – Reset auf Startzustand");

        resetMovements();
        greeted = false;
        lastTranscript = "";
        STATE = "idle";

        hideHint();

        if (model) {
          model.position.y = baseY;
          model.rotation.x = baseRotX;
          model.rotation.y = baseRotY - Math.PI / 2;
        }
      }

    }, 120000);

    return;
  }

  /* ===============================
       2️⃣ GREET → LISTEN
  =============================== */
  if (STATE === "greet" && !recRunning) {

    const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (!SR) {
      alert("Spracherkennung wird von diesem Browser nicht unterstützt.");
      return;
    }

    if (greetTimeout) {
      clearTimeout(greetTimeout);
      greetTimeout = null;
    }

    lastTranscript = "";
    listeningFinished = false;
    STATE = "listen";

    hideHint();

    // Recognition robust starten (muss aus deinem Recognition-Block kommen!)
    startRecognition();

    /* ===============================
       🛡️ MUSEUM-ABSICHERUNG
       Falls Recognition nicht startet
    =============================== */
    setTimeout(() => {

      if (STATE === "listen" && !recRunning) {

        console.warn("⚠️ Recognition start fehlgeschlagen – Fallback auf greet");

        STATE = "greet";
        resetMovements();
        showHint("Kurz Knopf drücken, dann fragen");
      }

    }, 800);

    return;
  }

  /* ===============================
       3️⃣ LISTEN – Klick ignorieren
  =============================== */
  if (STATE === "listen") return;
}
/* ===============================
   HINT-FUNKTIONEN
================================ */

function hideHint() {
  const hintElement = document.getElementById("hint");
  if (!hintElement) return;

  hintElement.classList.remove("visible");
  hintElement.innerText = "";
}

/* ===============================
   🏛️ MUSEUMS-RESET (PASSIV & SICHER) – FIXED
================================ */

// Optional: Wenn du KEINE zentrale Funktion hast, lass das erstmal so.
// Ich habe den Hook drin, damit recognition nach Reset nicht "null" bleibt.
function ensureRecognitionAfterReset() {
  // Wenn du recognition ohnehin erst beim Start-Listening baust, kannst du hier leer lassen.
  // Besser: später sauber implementieren (SpeechRecognition neu erstellen + Handler setzen).
  // Für jetzt: NICHTS tun, falls du es noch nicht hast.
  return;
}

function museumReset(reason = "") {
  console.log("🛡️ Museum-Reset:", reason);

  // ❌ Niemals während aktiver Nutzung eingreifen
  if (STATE !== "idle" || talking || recRunning) {
    console.log("⛔ Reset abgebrochen – System aktiv");
    return;
  }

  // --- Speech sicher beenden ---
  try {
    speechSynthesis.cancel();
  } catch (e) {}

  // --- Recognition hart beenden (aber nicht "tot" zurücklassen) ---
  try {
    if (recognition) recognition.abort();
  } catch (e) {}
  recRunning = false;

  // WICHTIG: recognition nicht einfach dauerhaft null lassen, außer du baust sie garantiert
  // an anderer Stelle vor jedem Start wieder neu auf.
  recognition = null;
  ensureRecognitionAfterReset();

  // --- Bewegungen vollständig neutralisieren ---
  resetMovements();

  // --- Transcript löschen ---
  lastTranscript = "";

  // --- Viseme neutral ---
  try {
    if (typeof setViseme === "function") {
      setViseme("M", 0);
    }
  } catch (e) {}

  // --- Avatar in definierte Ruhepose ---
  if (model) {
    model.position.y = baseY;
    model.rotation.x = baseRotX;
    model.rotation.y = baseRotY - Math.PI / 2;
  }

  // ✅ Hinweistext nach Reset anzeigen (optional)
  showHint("Kurz Knopf drücken, dann fragen");

  console.log("🟢 Museum-Reset abgeschlossen");
}

/* ===============================
   🔁 MUSEUMS-TRIGGER – FIXED
   (NUR WEG → ZURÜCK, ENTSPRELLT)
================================ */

let _lastVisState = document.visibilityState;
let _lastVisResetAt = 0;

document.addEventListener("visibilitychange", () => {
  const cur = document.visibilityState;
  const now = performance.now();

  // Nur wenn wir wirklich zurückkommen: hidden -> visible
  const cameBack = (_lastVisState === "hidden" && cur === "visible");
  _lastVisState = cur;

  if (!cameBack) return;

  // Entprellen (Chrome kann mehrfach feuern)
  if (now - _lastVisResetAt < 3000) return;
  _lastVisResetAt = now;

  if (STATE === "idle" && !talking && !recRunning) {
    museumReset("visibilitychange (back)");
  }
});
/* -----------------------------
   SPEAK – FINAL (VISEME-STABIL) – FIXED (DESKTOP-CHROME SAFE + MALE-PRIO DE)
----------------------------- */
function speak(text, slow = false, forceLang = null, onEnd = null) {

  // ✅ alte Queue hart löschen (Desktop-Chrome kann sonst "stapeln")
  try { speechSynthesis.cancel(); } catch (e) {}

  const u = new SpeechSynthesisUtterance(text);

  // ✅ Sprache bestimmen: forceLang priorisiert, sonst detectedLanguage global
  const lang = forceLang ? forceLang : (detectedLanguage || "de");
  u.lang = (lang === "en") ? "en-US" : "de-DE";

  // ✅ Stimme explizit setzen
  // Deutsch: maleVoice priorisieren (wenn vorhanden), sonst germanVoice
  // Englisch: englishVoice
  if (lang === "en") {
    u.voice = (typeof englishVoice !== "undefined" && englishVoice) ? englishVoice : null;
  } else {
    const mv = (typeof maleVoice !== "undefined" && maleVoice) ? maleVoice : null;
    const gv = (typeof germanVoice !== "undefined" && germanVoice) ? germanVoice : null;
    u.voice = mv || gv || null;
  }

  // ✅ Pitch: Englisch tiefer, Deutsch normal
  u.pitch = (lang === "en") ? 0.6 : 1.0;  // 0.0–2.0
  u.rate  = slow ? 0.85 : 1.0;

  const isGreeting = (STATE === "greet");

  let timer = null;
  let active = false;
  let preEndTimer = null;

  // 🛡️ Failsafe / finalize
  let finalized = false;
  let failSafeTimer = null;

  const stepMs = slow ? 135 : 95;
  const lerpFactor = 0.42;
  const baseClose = 0.04;

  /* -----------------------------
     HARTER STOP → RUHE
  ----------------------------- */
  function hardStopToRest() {
    active = false;

    if (timer) {
      clearInterval(timer);
      timer = null;
    }

    if (!visemeMesh || !visemeMesh.morphTargetInfluences) return;

    visemeMesh.morphTargetInfluences.fill(0);
    visemeMesh.morphTargetInfluences[visemeIndex.M] = baseClose;
  }

  function chooseNextViseme() {
    const r = Math.random();
    if (r < 0.42) return "A";
    if (r < 0.68) return "U";
    if (r < 0.84) return "E";
    return "O";
  }

  function startVisemes() {
    if (active || !visemeMesh || !visemeMesh.morphTargetInfluences) return;

    active = true;
    let targetIdx = visemeIndex[chooseNextViseme()];

    timer = setInterval(() => {
      if (!active) return;

      if (Math.random() < 0.5) {
        targetIdx = visemeIndex[chooseNextViseme()];
      }

      let target = 0.5 + Math.random() * 0.2;

      const key = Object.keys(visemeIndex)
        .find(k => visemeIndex[k] === targetIdx);

      if (key === "O") target *= 0.65;
      if (key === "E") target *= 0.75;

      const inf = visemeMesh.morphTargetInfluences;
      for (let i = 0; i < inf.length; i++) {
        const desired = (i === targetIdx) ? target : baseClose;
        inf[i] += (desired - inf[i]) * lerpFactor;
      }
    }, stepMs);
  }

  /* -----------------------------
     GROBE DAUER-SCHÄTZUNG
  ----------------------------- */
  function estimateSpeechDurationMs(text, slow) {
    const charsPerSecond = slow ? 8 : 12;
    return (text.length / charsPerSecond) * 1000;
  }

  /* -----------------------------
     FINALIZE (einmalig, egal ob onend oder failsafe)
  ----------------------------- */
  function finalizeOnce(reason = "onend") {
    if (finalized) return;
    finalized = true;

    // Timer aufräumen
    if (preEndTimer) {
      clearTimeout(preEndTimer);
      preEndTimer = null;
    }
    if (failSafeTimer) {
      clearTimeout(failSafeTimer);
      failSafeTimer = null;
    }

    hardStopToRest();
    talking = false;

    mouthCooldown = true;
    setTimeout(() => { mouthCooldown = false; }, 120);

    // UI/State-Logik wie gehabt
    if (STATE === "greet") {
      showHint("Kurz Knopf drücken, dann fragen");
    }

    if (STATE === "answer") {
      resetMovements();
      greeted = false;
      hmNeigen = false;
      rising = false;
      STATE = "idle";
      hideHint();
    }

    // ✅ Optionaler Callback (auch bei Failsafe!)
    if (onEnd && typeof onEnd === "function") {
      try { onEnd(); } catch (e) {}
    }

    // optionales Debug
    try {
      if (reason !== "onend") console.warn("🛟 speak() finalized via", reason);
    } catch (e) {}
  }

  /* -----------------------------
     START
  ----------------------------- */
  u.onstart = () => {
    talking = true;
    hardStopToRest();
    startVisemes();

    const PRE_END_STOP_MS = 500;
    const estimated = estimateSpeechDurationMs(text, slow);

    preEndTimer = setTimeout(() => {
      hardStopToRest();
    }, Math.max(0, estimated - PRE_END_STOP_MS));
  };

  /* -----------------------------
     SATZZEICHEN
  ----------------------------- */
  u.onboundary = (e) => {
    if (isGreeting) return;
    if (!active || !e || typeof e.charIndex !== "number") return;

    const ch = text[e.charIndex];

    if (",;:".includes(ch)) {
      active = false;
      setTimeout(() => startVisemes(), 90);
    }

    if (".!?".includes(ch)) {
      active = false;
    }
  };

  /* -----------------------------
     ENDE – ABSOLUTER SCHLUSS
  ----------------------------- */
  u.onend   = () => finalizeOnce("onend");
  u.onerror = () => finalizeOnce("onerror");

  /* -----------------------------
     FAILSAFE: wenn onend/onerror nie kommt
     (Desktop-Chrome "hängt" manchmal)
  ----------------------------- */
  const estimated = estimateSpeechDurationMs(text, slow);
  const FAILSAFE_MS = Math.min(45000, Math.max(6000, estimated + 2500)); // 6s–45s

  failSafeTimer = setTimeout(() => {
    try { speechSynthesis.cancel(); } catch (e) {}
    finalizeOnce("failsafe-timeout");
  }, FAILSAFE_MS);

  // ✅ Sprachausgabe starten
  try {
    speechSynthesis.speak(u);
  } catch (e) {
    // Wenn speak() direkt wirft: sofort sauber finalisieren
    finalizeOnce("speak-throw");
  }
}
/* -----------------------------
   RESIZE
----------------------------- */
window.addEventListener("resize", () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>
