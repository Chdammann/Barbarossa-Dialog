<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Frag Friedrich Barbarossa</title>

<link rel="icon" href="avatar.png" type="image/png">
<link rel="apple-touch-icon" href="avatar.png">
<meta name="theme-color" content="#000000">

<style>
  /* -----------------------------
     BODY & GRUNDLAYOUT
  ----------------------------- */
  body {
    margin: 0;
    overflow: hidden;
    background: black;
    font-family: "Georgia", serif;
    color: white;
    height: 100vh;
  }

  /* -----------------------------
     CANVAS (Fullscreen-Hintergrund)
  ----------------------------- */
  #avatarCanvas {
    position: fixed;
    inset: 0;
    width: 100%;
    height: 100%;
    display: block;
    z-index: 1;
  }

  /* -----------------------------
     ÜBERSCHRIFT
  ----------------------------- */
  h1 {
    position: absolute;
    top: 20px;
    width: 100%;
    text-align: center;
    font-size: 2em;
    color: #e0b36b;
    animation: pulse 3s ease-in-out infinite;
    z-index: 10;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.85; }
  }

  /* -----------------------------
     HINT TEXT (zentriert, gold)
  ----------------------------- */
  #hint {
    position: absolute;
    top: 70px;
    width: 100%;
    text-align: center;
    color: #e0b36b;
    font-size: 18px;
    z-index: 1000;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.4s ease;
  }

  #hint.visible {
    opacity: 1;
  }

  /* -----------------------------
     MIKROFONBUTTON
  ----------------------------- */
  #micBtn {
    position: absolute;
    bottom: 60px;
    left: 50%;
    transform: translateX(-50%);
    width: 80px;
    height: 80px;
    border-radius: 50%;
    border: none;
    background: #222;
    color: white;
    font-size: 32px;
    cursor: pointer;
    z-index: 10;
  }

  #micBtn:hover { background: #444; }

  /* -----------------------------
     LOADING TEXT
  ----------------------------- */
  #loading {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    color: #ccc;
    font-size: 1.1em;
    text-align: center;
    z-index: 10;
  }

  /* -----------------------------
     FOOTER
  ----------------------------- */
  footer {
    position: fixed;
    bottom: 12px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 13px;
    color: rgba(255, 255, 255, 0.6);
    text-align: center;
    pointer-events: none;
    z-index: 10000;
  }
</style>
</head>

<body>
  <h1>Frag Friedrich</h1>
  <div id="loading">Avatar wird geladen…</div>
  <div id="hint"></div>

  <canvas id="avatarCanvas"></canvas>
  <button id="micBtn">🎤</button>

  <footer>
    © 2025 Dr. Christoph Dammann
  </footer>

  <script>
    function showQuestionHint() {
      const hint = document.getElementById("hint");
      if (!hint) return;

      hint.innerText = "Kurz Knopf drücken, dann fragen";
      hint.classList.add("visible");
    }

    function hideQuestionHint() {
      const hint = document.getElementById("hint");
      if (!hint) return;

      hint.classList.remove("visible");
    }
  </script>

<script src="https://cdn.jsdelivr.net/npm/three@0.146.0/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.146.0/examples/js/loaders/GLTFLoader.js"></script>

<script>
console.log("SCRIPT START");
  
/* ==========================================
   MUSEUM STARTUP CLEANUP – SICHER & LOKAL
   ========================================== */

(function museumStartupCleanup() {
  try {
    console.log("[Museum] Startup cleanup begin");

    /* 1️⃣ Eigene Storage-Daten löschen */
    try {
      localStorage.clear();
      sessionStorage.clear();
      console.log("[Museum] localStorage & sessionStorage cleared");
    } catch (e) {
      console.warn("[Museum] Storage clear failed:", e);
    }

    /* 2️⃣ IndexedDB vollständig löschen (Speech / Media-Reste) */
    if (window.indexedDB && indexedDB.databases) {
      indexedDB.databases().then(dbs => {
        dbs.forEach(db => {
          if (db.name) {
            indexedDB.deleteDatabase(db.name);
            console.log("[Museum] IndexedDB deleted:", db.name);
          }
        });
      });
    }

    /* 3️⃣ Service Worker entfernen (falls jemals vorhanden) */
    if ("serviceWorker" in navigator) {
      navigator.serviceWorker.getRegistrations().then(regs => {
        regs.forEach(reg => {
          reg.unregister();
          console.log("[Museum] ServiceWorker unregistered");
        });
      });
    }

    /* 4️⃣ Harte Reset-Flags für Avatar-Logik */
    window.__MUSEUM_RESET__ = true;

    console.log("[Museum] Startup cleanup done");
  } catch (err) {
    console.error("[Museum] Startup cleanup error:", err);
  }
})();

/* ===============================
   STATE-DEFINITION + VARIABLEN + BEWEGUNGEN
================================ */

// === VISEME-STATE ===
let visemeMesh = null;   // wird im GLTF-Loader gesetzt

// === Audio / Analyse (Reserve) ===
let audioCtx = null;
let analyser = null;
let src = null;

// === ZENTRALE ZUSTANDSMASCHINE ===
let STATE = "idle"; // erlaubte Zustände: "sleep", "idle", "greet", "listen", "answer", "think"

// === Kern-Flags ===
let model = null;
let lastTranscript = "";
let greeted = false;
let talking = false;
let recRunning = false;
let runId = 0;                  
let listeningFinished = false;
let buttonLocked = false;
let mouthCooldown = false;
let greetTimeout = null;

// === Bewegungsflags (für Animate / State-Machine) + Grundposition ===
let hmNeigen = false;      
let rising = false;        
let frontalFix = false;    
let hmStartTime = 0;       
let riseStartTime = 0;     
let toIdlePose = false;    
let toIdleStart = 0;       
const toIdleDuration = 3000;

// === Animationszeiten (ms) ===
const hmDuration = 8000;   
const riseDuration = 3000; 

// === Grundposition Avatar ===
let baseRotY = -0.35;
let baseRotX = 0.25;
let baseY = 0;

// === RESET ALLER BEWEGUNGEN (hart, eindeutig) ===
function resetMovements() {
  hmNeigen = false;
  rising = false;
  toIdlePose = false;
  talking = false;

  if (model) {
    model.rotation.x = baseRotX;
    model.rotation.y = baseRotY;
    model.position.y = baseY;
  }
}

/* ===============================
   HINT-FUNKTIONEN (TEXT EIN-/AUSBLENDEN)
================================ */
function showHint(message) {
  const hintElement = document.getElementById("hint");
  if (!hintElement) {
    console.warn("Hint-Element nicht gefunden");
    return;
  }

  hintElement.innerText = message;
  hintElement.classList.add("visible");
}

function hideHint() {
  const hintElement = document.getElementById("hint");
  if (!hintElement) return;

  hintElement.classList.remove("visible");
  hintElement.innerText = "";
}

/* -----------------------------
   THREE.js SETUP
----------------------------- */

const scene = new THREE.Scene();

const camera = new THREE.PerspectiveCamera(
  30,
  window.innerWidth / window.innerHeight,
  0.1,
  1000
);
camera.position.set(0, 0, 2.8);

const renderer = new THREE.WebGLRenderer({
  canvas: document.getElementById("avatarCanvas"),
  antialias: true
});
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(window.devicePixelRatio);
renderer.setClearColor(0x000000);

/* -----------------------------
   LICHT
----------------------------- */
const dirLight = new THREE.DirectionalLight(0xffffff, 2);
dirLight.position.set(1, 1, 2);
scene.add(dirLight);

const ambLight = new THREE.AmbientLight(0xffffff, 0.8);
scene.add(ambLight);

const frontLight = new THREE.PointLight(0xffffff, 0.8);
frontLight.position.set(0, 0.5, 2);
scene.add(frontLight);

/* -----------------------------
   MODEL + VISEME
----------------------------- */

const visemeIndex = {
  A: 0,
  E: 1,
  O: 2,
  U: 3,
  M: 4
};

const loader = new THREE.GLTFLoader();
loader.load("./avatar.glb",
  (gltf) => {
    model = gltf.scene;
    scene.add(model);

    model.traverse(obj => {
      if ((obj.isMesh || obj.isSkinnedMesh) && obj.morphTargetDictionary) {
        if (!visemeMesh) visemeMesh = obj;
      }
    });

    if (!visemeMesh) console.error("❌ KEIN Viseme-Mesh gefunden!");

    const loadingEl = document.getElementById("loading");
    if (loadingEl) loadingEl.style.display = "none";

    animate();
  },
  undefined,
  (err) => console.error("❌ Fehler beim Laden von avatar.glb:", err)
);

function setViseme(key, value) {
  if (!visemeMesh || !visemeMesh.morphTargetInfluences) return;

  const idx = visemeIndex[key];
  if (idx === undefined) return;

  visemeMesh.morphTargetInfluences.fill(0);
  visemeMesh.morphTargetInfluences[idx] = value;
}

window.addEventListener("resize", () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

/* ====================================
   ANIMATE – FINAL & STABIL (VISEME-KLON)
==================================== */
function animate() {
  requestAnimationFrame(animate);
  if (!model) return;

  const now = performance.now();
  const frontalY = -Math.PI / 2;
  const rightY   = baseRotY - Math.PI / 2;
  const leftY    = frontalY + 0.25;

  // MOUTH COOLDOWN
  if (mouthCooldown) setViseme("M", 0);

  // Mund neutral, wenn nicht gesprochen wird
  if (!mouthCooldown && !talking && STATE !== "think") setViseme("M", 0);

  // THINK-PHASE
  if (STATE === "think" && hmNeigen) {
    model.rotation.x = THREE.MathUtils.lerp(model.rotation.x, baseRotX + 0.25, 0.04);
    model.rotation.y = THREE.MathUtils.lerp(model.rotation.y, leftY, 0.04);
    renderer.render(scene, camera);
    return;
  }

  // RISING / ANSWER
  if (rising) {
    model.rotation.y = THREE.MathUtils.lerp(model.rotation.y, frontalY, 0.06);
    model.rotation.x = THREE.MathUtils.lerp(model.rotation.x, baseRotX, 0.06);
  }

  // TALKING / LISTEN / GREET
  else if (talking || STATE === "listen" || STATE === "greet") {
    const breath = Math.sin(now * 0.0015) * 0.008;
    model.position.y = baseY + breath;
    model.rotation.y = THREE.MathUtils.lerp(model.rotation.y, frontalY, 0.03);
    model.rotation.x = THREE.MathUtils.lerp(model.rotation.x, baseRotX, 0.03);
  }

  // IDLE
  else if (STATE === "idle" && !recRunning && !talking) {
    const breath = Math.sin(now * 0.0019) * 0.006;
    model.position.y = baseY + breath;
    model.rotation.y = THREE.MathUtils.lerp(model.rotation.y, rightY, 0.03);
    model.rotation.x = THREE.MathUtils.lerp(model.rotation.x, baseRotX, 0.03);
  }

  // DRIFT
  if (STATE !== "think") {
    const driftX = Math.sin(now * 0.0004) * 0.015;
    const driftY = Math.sin(now * 0.0003) * 0.012;
    model.rotation.x = THREE.MathUtils.lerp(model.rotation.x, baseRotX + driftX, 0.02);

    const baseYaw = (STATE === "idle") ? rightY : frontalY;
    model.rotation.y = THREE.MathUtils.lerp(model.rotation.y, baseYaw + driftY, 0.02);
  }

  renderer.render(scene, camera);
}

/* ==============================
   STATE MACHINE – RECOGNITION
============================== */
let recognition = null;
let heardSomething = false;
let detectedLanguage = "de";

function initRecognition() {
  if (!("webkitSpeechRecognition" in window)) return;

  recognition = new webkitSpeechRecognition();
  recognition.continuous = false;
  recognition.interimResults = false;
  heardSomething = false;

  recognition.onresult = (e) => {
    if (STATE !== "listen") return;

    const res = e.results[0][0].transcript;
    if (!res || res.trim().length < 2) return;

    lastTranscript = res.trim();
    detectedLanguage = detectLanguage(lastTranscript);
    heardSomething = true;
  };

  recognition.onend = () => {
    recRunning = false;
    if (STATE !== "listen" || !heardSomething || !lastTranscript) {
      STATE = "idle";
      return;
    }

    STATE = "think";
    resetMovements();
    rising = false;
    frontalFix = false;

    requestAnimationFrame(() => {
      hmNeigen = true;
      hmStartTime = performance.now();
    });

    const thinkText = detectedLanguage === "en" 
      ? "Uhm… one moment, please." 
      : "Ähm … einen Moment bitte.";

    speak(thinkText, true, detectedLanguage, () => {
      hmNeigen = false;
      startAnswerFetch();
    });
  };
}

function startAnswerFetch() {
  STATE = "answer";
  resetMovements();
  rising = true;
  riseStartTime = performance.now();

  fetch("/ask", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ text: lastTranscript, lang: detectedLanguage })
  })
  .then(r => r.json())
  .then(data => {
    const answerText = data.answer || 
      (detectedLanguage === "en" ? "Sorry, I didn't understand." : "Verzeiht, ich habe Euch nicht recht verstanden.");
    speak(answerText, false, detectedLanguage, () => {
      rising = false;
      frontalFix = false;
      resetMovements();
      STATE = "idle";
      greeted = false;
      hideHint();
    });
  })
  .catch(() => {
    const fallback = detectedLanguage === "en" ? "Sorry, I didn't understand." : "Verzeiht, ich habe Euch nicht recht verstanden.";
    speak(fallback, false, detectedLanguage, () => {
      rising = false;
      frontalFix = false;
      resetMovements();
      STATE = "idle";
      greeted = false;
      hideHint();
    });
  });
}

/* ==============================
   BUTTON + ENTER – GREET & LISTEN
============================== */
const micBtn = document.getElementById("micBtn");

function startInteraction() {
  if ((STATE !== "idle" && STATE !== "greet") || talking || recRunning || buttonLocked) return;

  buttonLocked = true;
  setTimeout(() => buttonLocked = false, 1200);

  if (STATE === "idle" && !greeted) {
    greeted = true;
    STATE = "greet";
    resetMovements();
    frontalFix = false;
    rising = true;
    riseStartTime = performance.now();

    try { if (recognition) recognition.abort(); } catch(e) {}
    recRunning = false;
    listeningFinished = false;

    speak(
      "Seid gegrüßt, mein Freund. Ich bin Friedrich Barbarossa, nach fast neunhundert Jahren im Kaiserberg zu Lautern erwacht. Was ist Euer Begehr? If ju wonnt, spiek inglisch.",
      false,
      "de",
      () => { showHint("Kurz Knopf drücken, dann fragen"); }
    );

    if (greetTimeout) clearTimeout(greetTimeout);
    greetTimeout = setTimeout(() => {
      if (STATE === "greet" && !recRunning && !talking) {
        resetMovements();
        greeted = false;
        lastTranscript = "";
        STATE = "idle";
        hideHint();
        if (model) {
          model.position.y = baseY;
          model.rotation.x = baseRotX;
          model.rotation.y = baseRotY - Math.PI / 2;
        }
      }
    }, 120000);

    return;
  }

  if (STATE === "greet" && !recRunning) {
    if (!("webkitSpeechRecognition" in window)) {
      alert("Spracherkennung wird von diesem Browser nicht unterstützt.");
      return;
    }

    if (greetTimeout) { clearTimeout(greetTimeout); greetTimeout = null; }

    initRecognition();
    lastTranscript = "";
    listeningFinished = false;
    STATE = "listen";
    hideHint();

    recognition.lang = detectedLanguage === "en" ? "en-US" : "de-DE";

    heardSomething = false;
    recRunning = true;
    try { recognition.start(); } catch(e) { recRunning = false; STATE = "idle"; }
    return;
  }

  if (STATE === "listen") return;
}

micBtn.onclick = startInteraction;
document.addEventListener("keydown", (e) => {
  if (e.key === "Enter") { e.preventDefault(); startInteraction(); }
});

/* ==============================
   SPEAK – FINAL (VISEME-STABIL)
============================== */
function speak(text, slow = false, forceLang = null, onEnd = null) {
  // … hier der Speak-Block wie von dir zusammengestellt …
}

/* ==============================
   🏛️ MUSEUMS-RESET (PASSIV & SICHER)
============================== */
function museumReset(reason = "") {
  if (STATE !== "idle" || talking || recRunning) return;

  try { speechSynthesis.cancel(); } catch(e) {}
  try { if(recognition) recognition.abort(); } catch(e) {}
  recRunning = false;
  recognition = null;

  resetMovements();
  hmNeigen = false;
  rising = false;
  frontalFix = false;
  lastTranscript = "";

  try { if(visemeMesh && visemeMesh.morphTargetInfluences) visemeMesh.morphTargetInfluences.fill(0); } catch(e) {}

  if(model) {
    model.position.y = baseY;
    model.rotation.x = baseRotX;
    model.rotation.y = baseRotY - Math.PI / 2;
  }

  showHint("Kurz Knopf drücken, dann fragen");
}

document.addEventListener("visibilitychange", () => {
  if(document.hidden && STATE === "idle" && !talking && !recRunning) {
    museumReset("visibilitychange");
  }
});
/* -----------------------------
   RESIZE
----------------------------- */
window.addEventListener("resize", () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>
</body>
</html>
