/* ==========================================
   MUSEUM STARTUP CLEANUP – SICHER & LOKAL
   ========================================== */

(function museumStartupCleanup() {
  try {
    console.log("[Museum] Startup cleanup begin");

    /* 1️⃣ Eigene Storage-Daten löschen */
    try {
      localStorage.clear();
      sessionStorage.clear();
      console.log("[Museum] localStorage & sessionStorage cleared");
    } catch (e) {
      console.warn("[Museum] Storage clear failed:", e);
    }

    /* 2️⃣ IndexedDB vollständig löschen (Speech / Media-Reste) */
    if (window.indexedDB && indexedDB.databases) {
      indexedDB.databases().then(dbs => {
        dbs.forEach(db => {
          if (db.name) {
            indexedDB.deleteDatabase(db.name);
            console.log("[Museum] IndexedDB deleted:", db.name);
          }
        });
      });
    }

    /* 3️⃣ Service Worker entfernen (falls jemals vorhanden) */
    if ("serviceWorker" in navigator) {
      navigator.serviceWorker.getRegistrations().then(regs => {
        regs.forEach(reg => {
          reg.unregister();
          console.log("[Museum] ServiceWorker unregistered");
        });
      });
    }

    /* 4️⃣ Harte Reset-Flags für Avatar-Logik */
    window.__MUSEUM_RESET__ = true;

    console.log("[Museum] Startup cleanup done");
  } catch (err) {
    console.error("[Museum] Startup cleanup error:", err);
  }
})();

function loadVoices() {
  const voices = speechSynthesis.getVoices();
  if (!voices || !voices.length) return;

  germanVoice =
    voices.find(v => v.lang.startsWith("de") && v.name.toLowerCase().includes("google")) ||
    voices.find(v => v.lang.startsWith("de") && v.name.toLowerCase().includes("stefan")) ||
    voices.find(v => v.lang.startsWith("de")) ||
    null;

  maleVoice =
    voices.find(v => v.lang === "de-DE" && v.name.toLowerCase().includes("stefan")) ||
    voices.find(v => v.lang.startsWith("de")) ||
    null;

  englishVoice =
    voices.find(v => v.lang.startsWith("en") && v.name.toLowerCase().includes("google")) ||
    voices.find(v => v.lang.startsWith("en") && v.name.toLowerCase().includes("david")) ||
    voices.find(v => v.lang.startsWith("en")) ||
    null;

  console.log("🎤 Voices geladen:", { germanVoice, maleVoice, englishVoice });
}

// Stimmen werden oft asynchron nachgeladen

// === ROBUSTE Sprachdetektion Deutsch / Englisch ===
function detectLanguage(text) {
  const enWords = [
    "the","what","how","why","where","when","who","which","whose","whom",
    "is","are","was","were","do","does","did","have","has","had",
    "can","could","would","should","will","shall","may","might","must",
    "tell","explain","describe","show","give","talk","say",
    "speak","think","know","mean",
    "about","history","life","death","war","battle","empire","king",
    "emperor","rome","roman","germany","italy","crusade","church",
    "please","thanks","thank","hello","hi","hey",
    "in","on","at","with","without","from","into","during","before","after"
  ];

  const deWords = [
    "der","die","das","was","wie","warum","wieso","weshalb","wo","wer","wen","wem",
    "ist","sind","war","waren","hat","haben","hatte","hatten",
    "kann","könnte","würde","soll","sollte","will","möchte","muss",
    "erzähle","erkläre","beschreibe","zeige","sage","sprich",
    "über","geschichte","leben","tod","krieg","schlacht","reich",
    "kaiser","könig","rom","deutschland","italien","kreuzzug","kirche",
    "bitte","danke","hallo","guten",
    "in","auf","an","mit","ohne","von","zu","während","vor","nach"
  ];

  const t = text.toLowerCase();
  let e = 0, d = 0;

  for (const w of enWords) if (t.includes(` ${w}`) || t.startsWith(w + " ")) e++;
  for (const w of deWords) if (t.includes(` ${w}`) || t.startsWith(w + " ")) d++;

  if (t.match(/\b(ing|tion|ment|ness|ship|able)\b/)) e += 2;
  if (t.match(/\b(ung|keit|heit|chen|lein|schaft)\b/)) d += 2;

  return (e > d) ? "en" : "de";
}

let hmStartTime = 0;       // Startzeit Kopfneigung

// globale Referenz (State-Machine nutzt sie)
visemeMesh = null;

// feste Indizes aus Blender

/* -----------------------------
   VISEME – NIEDRIGE EBENE
----------------------------- */
function setViseme(key, value) {
  if (!visemeMesh || !visemeMesh.morphTargetInfluences) return;

  const idx = visemeIndex[key];
  if (idx === undefined) return;

  // alle schließen
  visemeMesh.morphTargetInfluences.fill(0);

  // Ziel setzen
  visemeMesh.morphTargetInfluences[idx] = value;
}

/* -----------------------------
   RESPONSIVE HANDLING
----------------------------- */
window.addEventListener("resize", () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
  console.log("[Three.js] Resize applied");
});
// ====================================
// ANIMATE – FINAL & STABIL (VISEME-KLON)
// ====================================
function animate() {
  requestAnimationFrame(animate);
  if (!model) return;

  const now = performance.now();
  const frontalY = -Math.PI / 2;
  const rightY   = baseRotY - Math.PI / 2;
  const leftY    = frontalY + 0.25;

  /* ===============================
     🛑 MOUTH-COOLDOWN (HÖCHSTE PRIORITÄT)
     → verhindert Nachklappern
  =============================== */
  if (mouthCooldown) {
    setViseme("M", 0);
  }

  /* ===============================
     🧊 Mund neutral, wenn nicht gesprochen wird
     (NUR wenn KEIN Cooldown aktiv)
  =============================== */
  if (!mouthCooldown && !talking && STATE !== "think") {
    setViseme("M", 0);
  }

  /* ===============================
     THINK-PHASE → HMMM / NEIGEN
     (HÖCHSTE PRIORITÄT FÜR KOPF)
  =============================== */
  if (STATE === "think" && hmNeigen) {
    model.rotation.x = THREE.MathUtils.lerp(
      model.rotation.x,
      baseRotX + 0.25,
      0.04
    );
    model.rotation.y = THREE.MathUtils.lerp(
      model.rotation.y,
      leftY,
      0.04
    );

    renderer.render(scene, camera);
    return; // ⛔ nichts darüber hinwegzeichnen
  }

  /* ===============================
     RISING / ANSWER → FRONTAL
  =============================== */
  if (rising) {
    model.rotation.y = THREE.MathUtils.lerp(model.rotation.y, frontalY, 0.06);
    model.rotation.x = THREE.MathUtils.lerp(model.rotation.x, baseRotX, 0.06);
  }

  /* ===============================
     TALKING / LISTEN / GREET
     → leichte Kopfbewegung + Atem
  =============================== */
  else if (talking || STATE === "listen" || STATE === "greet") {
    const breath = Math.sin(now * 0.0015) * 0.008;
    model.position.y = baseY + breath;
    model.rotation.y = THREE.MathUtils.lerp(model.rotation.y, frontalY, 0.03);
    model.rotation.x = THREE.MathUtils.lerp(model.rotation.x, baseRotX, 0.03);
  }

  /* ===============================
     IDLE → SANFT NACH RECHTS + ATEM
  =============================== */
  else if (STATE === "idle" && !recRunning && !talking) {
    const breath = Math.sin(now * 0.0019) * 0.006; // ~ ±2 mm
    model.position.y = baseY + breath;
    model.rotation.y = THREE.MathUtils.lerp(model.rotation.y, rightY, 0.03);
    model.rotation.x = THREE.MathUtils.lerp(model.rotation.x, baseRotX, 0.03);
  }

  /* ===============================
     DRIFT / kleine Zufallsbewegungen
     → nur außerhalb THINK-Phase
  =============================== */
  if (STATE !== "think") {
    const driftX = Math.sin(now * 0.0004) * 0.015;
    const driftY = Math.sin(now * 0.0003) * 0.012;

    model.rotation.x = THREE.MathUtils.lerp(
      model.rotation.x,
      baseRotX + driftX,
      0.02
    );

    const baseYaw = (STATE === "idle") ? rightY : frontalY;
    model.rotation.y = THREE.MathUtils.lerp(
      model.rotation.y,
      baseYaw + driftY,
      0.02
    );
  }

  renderer.render(scene, camera);
}
// ==============================
// STATE MACHINE – RECOGNITION
// MIT THINK-PHASE (WAKE-SICHER)
// ==============================

let recognition = null;
let heardSomething = false;
let detectedLanguage = "de";  // Sprache der letzten Eingabe

// -----------------------------
// Recognition sauber initialisieren
// -----------------------------
function initRecognition() {
  if (!("webkitSpeechRecognition" in window)) return;

  recognition = new webkitSpeechRecognition();
  recognition.continuous = false;
  recognition.interimResults = false;

  heardSomething = false;

  recognition.onresult = (e) => {
    if (STATE !== "listen") return;

    const res = e.results[0][0].transcript;
    if (!res || res.trim().length < 2) return;

    lastTranscript = res.trim();
    detectedLanguage = detectLanguage(lastTranscript);
    heardSomething = true;
  };

  recognition.onend = () => {
    recRunning = false;

    // Kein Think-Phase-Trigger, wenn nichts gehört wurde
    if (STATE !== "listen") return;
    if (!heardSomething || !lastTranscript) {
      STATE = "idle";
      return;
    }

    // ===============================
    // THINK-PHASE
    // ===============================
    STATE = "think";
    resetMovements();       // alle Bewegungen zurücksetzen
    rising = false;         // sicherstellen, dass Rising nicht parallel läuft
    frontalFix = false;

    // Think-Neigung leicht verzögert starten
    requestAnimationFrame(() => {
      hmNeigen = true;
      hmStartTime = performance.now();
    });

    // Denkphrase in aktueller Sprache
    const thinkText = detectedLanguage === "en" 
      ? "Uhm… one moment, please." 
      : "Ähm … einen Moment bitte.";

    speak(thinkText, true, detectedLanguage, () => {
      hmNeigen = false;     // Think-Neigung nach Ende zurücksetzen
      startAnswerFetch();    // Antwortphase starten
    });
  };
}

// -----------------------------
// Antwort-Phase sauber kapseln
// -----------------------------
function startAnswerFetch() {
  STATE = "answer";
  resetMovements();        // Bewegungen sauber zurücksetzen
  rising = true;           // Aufrichten für Antwort
  riseStartTime = performance.now();

  fetch("/ask", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ 
      text: lastTranscript,
      lang: detectedLanguage
    })
  })
  .then(r => r.json())
  .then(data => {
    const answerText = data.answer 
      || (detectedLanguage === "en" 
          ? "Sorry, I didn't understand." 
          : "Verzeiht, ich habe Euch nicht recht verstanden.");
    speak(answerText, false, detectedLanguage, () => {
      rising = false;
      frontalFix = false;
      resetMovements();
      STATE = "idle";
      greeted = false;
      hideHint();
    });
  })
  .catch(() => {
    const fallback = detectedLanguage === "en" 
      ? "Sorry, I didn't understand." 
      : "Verzeiht, ich habe Euch nicht recht verstanden.";
    speak(fallback, false, detectedLanguage, () => {
      rising = false;
      frontalFix = false;
      resetMovements();
      STATE = "idle";
      greeted = false;
      hideHint();
    });
  });
}

// -----------------------------
// Recognition starten
// (vor jedem Listen-Versuch)
// -----------------------------
function startRecognition() {
  initRecognition();

  if (recRunning && recognition) {
    try { recognition.abort(); } catch(e) {}
  }

  recognition.lang = detectedLanguage === "en" ? "en-US" : "de-DE";

  heardSomething = false;
  recRunning = true;
  try {
    recognition.start();
  } catch(e) {
    console.warn("🛑 Recognition konnte nicht gestartet werden:", e);
    recRunning = false;
  }
}
// ==============================
// BUTTON + ENTER – GREET & LISTEN
// ==============================

const micBtn = document.getElementById("micBtn");

function startInteraction() {

  // 🛡️ Nur in erlaubten Zuständen reagieren
  if (STATE !== "idle" && STATE !== "greet") return;

  // 🛡️ Schutz bei laufender Aktion
  if (talking || recRunning) return;

  // 🔒 Button-Guard gegen Doppelklick / Prellen
  if (buttonLocked) return;
  buttonLocked = true;
  setTimeout(() => buttonLocked = false, 1200);

  // ===============================
  // 1️⃣ IDLE → GREET
  // ===============================
  if (STATE === "idle" && !greeted) {
    greeted = true;
    STATE = "greet";

    resetMovements();
    frontalFix = false;
    rising = true;
    riseStartTime = performance.now();

    // 🔁 Alte Recognition hart abbrechen
    try { if (recognition) recognition.abort(); } catch (e) {}
    recRunning = false;
    listeningFinished = false;

    // ✅ Begrüßung männlich auf Deutsch, hint erst danach
    speak(
      "Seid gegrüßt, mein Freund. Ich bin Friedrich Barbarossa, nach fast neunhundert Jahren im Kaiserberg zu Lautern erwacht. Was ist Euer Begehr? If ju wonnt, spiek inglisch.",
      false,
      "de",
      () => { showHint("Kurz Knopf drücken, dann fragen"); }
    );

    // 🕰️ Auto-Reset nach 2 Minuten ohne Reaktion
    if (greetTimeout) clearTimeout(greetTimeout);
    greetTimeout = setTimeout(() => {
      if (STATE === "greet" && !recRunning && !talking) {
        console.log("⏳ Begrüßung ohne Reaktion – Reset auf Startzustand");
        resetMovements();
        greeted = false;
        lastTranscript = "";
        STATE = "idle";
        hideHint();
        if (model) {
          model.position.y = baseY;
          model.rotation.x = baseRotX;
          model.rotation.y = baseRotY - Math.PI / 2;
        }
      }
    }, 120000); // 2 Minuten

    return;
  }

  // ===============================
  // 2️⃣ GREET → LISTEN
  // ===============================
  if (STATE === "greet" && !recRunning) {
    if (!("webkitSpeechRecognition" in window)) {
      alert("Spracherkennung wird von diesem Browser nicht unterstützt.");
      return;
    }

    // 🔄 Auto-Reset abbrechen
    if (greetTimeout) {
      clearTimeout(greetTimeout);
      greetTimeout = null;
    }

    initRecognition();

    lastTranscript = "";
    listeningFinished = false;
    STATE = "listen";

    hideHint();

    // ✅ Sprache aus detectedLanguage, Fallback auf Deutsch
    recognition.lang = detectedLanguage === "en" ? "en-US" : "de-DE";

    heardSomething = false;
    recRunning = true;
    try {
      recognition.start();
    } catch (e) {
      console.warn("🛑 Recognition konnte nicht gestartet werden:", e);
      recRunning = false;
      STATE = "idle";
    }

    return;
  }

  // ===============================
  // 3️⃣ LISTEN – Klicks werden ignoriert
  // ===============================
  if (STATE === "listen") return;
}

// ===============================
// EVENTS
// ===============================

micBtn.onclick = startInteraction;

document.addEventListener("keydown", (e) => {
  if (e.key === "Enter") {
    e.preventDefault();
    startInteraction();
  }
});

// ===============================
// RECOGNITION START (Dummy)
// ===============================
function startRecognition() {
  // absichtlich leer (Kompatibilität)
}
/* ===============================
   HINT-FUNKTIONEN
================================ */

function hideHint() {
  const hintElement = document.getElementById("hint");
  if (!hintElement) return;

  hintElement.classList.remove("visible");
  hintElement.innerText = "";
}

// ===============================
// 🏛️ MUSEUMS-RESET (PASSIV & SICHER)
// ==============================

function museumReset(reason = "") {
  console.log("🛡️ Museum-Reset:", reason);

  // ❌ Niemals während aktiver Nutzung eingreifen
  if (STATE !== "idle" || talking || recRunning) {
    console.log("⛔ Reset abgebrochen – System aktiv");
    return;
  }

  // --- Speech sicher beenden ---
  try {
    speechSynthesis.cancel();
  } catch (e) {
    console.warn("Fehler beim Stoppen der Sprachausgabe:", e);
  }

  // --- Recognition hart beenden & verwerfen ---
  try {
    if (recognition) recognition.abort();
  } catch (e) {
    console.warn("Fehler beim Abbrechen der Recognition:", e);
  }
  recRunning = false;
  recognition = null;

  // --- Bewegungen vollständig neutralisieren ---
  resetMovements();
  hmNeigen = false;
  rising = false;
  frontalFix = false;

  // --- Transcript löschen ---
  lastTranscript = "";

  // --- Viseme neutral setzen ---
  try {
    if (typeof setViseme === "function") {
      setViseme("M", 0);
    } else if (visemeMesh && visemeMesh.morphTargetInfluences) {
      visemeMesh.morphTargetInfluences.fill(0);
      if (visemeIndex.M != null) {
        visemeMesh.morphTargetInfluences[visemeIndex.M] = 0.04;
      }
    }
  } catch (e) {
    console.warn("Fehler beim Zurücksetzen der Visemes:", e);
  }

  // --- Avatar in definierte Ruhepose ---
  if (model) {
    model.position.y = baseY;
    model.rotation.x = baseRotX;
    model.rotation.y = baseRotY - Math.PI / 2;
  }

  // ✅ Hinweistext nach Reset optional anzeigen
  showHint("Kurz Knopf drücken, dann fragen");

  console.log("🟢 Museum-Reset abgeschlossen");
}

// ===============================
// 🔁 MUSEUMS-TRIGGER
// (NUR BILDSCHIRM WEG / ZURÜCK)
// ==============================

// Reagiert nur auf echtes "Tab verborgen"
document.addEventListener("visibilitychange", () => {
  if (
    document.hidden &&
    STATE === "idle" &&
    !talking &&
    !recRunning
  ) {
    museumReset("visibilitychange");
  }
});
/* -----------------------------
   SPEAK – FINAL (VISEME-STABIL)
----------------------------- */
function speak(text, slow = false, forceLang = null, onEnd = null) {

  const u = new SpeechSynthesisUtterance(text);

  // Sprache bestimmen: forceLang priorisiert, sonst detectedLanguage global
  const lang = forceLang ? forceLang : (detectedLanguage || "de");
  u.lang = (lang === "en") ? "en-US" : "de-DE";

  // Stimme explizit setzen
  if (lang === "en") {
    u.voice = englishVoice || null;
  } else {
    u.voice = maleVoice || germanVoice || null;
  }

  u.pitch = (lang === "en") ? 0.6 : 1.0;
  u.rate = slow ? 0.85 : 1.0;

  const isGreeting = (STATE === "greet");

  let timer = null;
  let active = false;
  let preEndTimer = null;

  const stepMs = slow ? 135 : 95;
  const lerpFactor = 0.42;
  const baseClose = 0.04;

  /* -----------------------------
     HARTER STOP → RUHE
  ----------------------------- */
  function hardStopToRest() {
    active = false;
    if (timer) { clearInterval(timer); timer = null; }

    if (!visemeMesh || !visemeMesh.morphTargetInfluences) return;
    visemeMesh.morphTargetInfluences.fill(0);
    if (visemeIndex.M != null) {
      visemeMesh.morphTargetInfluences[visemeIndex.M] = baseClose;
    }
  }

  /* -----------------------------
     NÄCHSTES VISEME WÄHLEN
  ----------------------------- */
  function chooseNextViseme() {
    const r = Math.random();
    if (r < 0.42) return "A";
    if (r < 0.68) return "U";
    if (r < 0.84) return "E";
    return "O";
  }

  /* -----------------------------
     VISME-ANIMATION START
  ----------------------------- */
  function startVisemes() {
    if (active || !visemeMesh || !visemeMesh.morphTargetInfluences) return;
    active = true;

    let targetIdx = visemeIndex[chooseNextViseme()];
    timer = setInterval(() => {
      if (!active) return;

      if (Math.random() < 0.5) targetIdx = visemeIndex[chooseNextViseme()];
      let target = 0.5 + Math.random() * 0.2;

      const key = Object.keys(visemeIndex)
        .find(k => visemeIndex[k] === targetIdx);

      if (key === "O") target *= 0.65;
      if (key === "E") target *= 0.75;

      const inf = visemeMesh.morphTargetInfluences;
      for (let i = 0; i < inf.length; i++) {
        const desired = (i === targetIdx) ? target : baseClose;
        inf[i] += (desired - inf[i]) * lerpFactor;
      }
    }, stepMs);
  }

  /* -----------------------------
     DAUER SCHÄTZEN
  ----------------------------- */
  function estimateSpeechDurationMs(text, slow) {
    const charsPerSecond = slow ? 8 : 12;
    return (text.length / charsPerSecond) * 1000;
  }

  /* -----------------------------
     START
  ----------------------------- */
  u.onstart = () => {
    talking = true;
    hardStopToRest();

    if (!isGreeting) startVisemes();

    const PRE_END_STOP_MS = 500;
    const estimated = estimateSpeechDurationMs(text, slow);
    preEndTimer = setTimeout(() => { hardStopToRest(); }, Math.max(0, estimated - PRE_END_STOP_MS));
  };

  /* -----------------------------
     SATZZEICHEN HANDLING
  ----------------------------- */
  u.onboundary = e => {
    if (isGreeting) return;
    if (!active || !e || typeof e.charIndex !== "number") return;

    const ch = text[e.charIndex];
    if (",;:".includes(ch)) {
      active = false;
      setTimeout(() => startVisemes(), 90);
    }
    if (".!?".includes(ch)) active = false;
  };

  /* -----------------------------
     ENDE – ABSOLUTER SCHLUSS
  ----------------------------- */
  u.onend = () => {
    if (preEndTimer) { clearTimeout(preEndTimer); preEndTimer = null; }
    hardStopToRest();
    talking = false;

    mouthCooldown = true;
    setTimeout(() => { mouthCooldown = false; }, 120);

    // Nach Begrüßung Hint anzeigen
    if (STATE === "greet") {
      showHint("Kurz Knopf drücken, dann fragen");
    }

    // Nach Antwort → Frontale zurück & Bewegungen reset
    if (STATE === "answer") {
      resetMovements();
      greeted = false;
      hmNeigen = false;
      rising = false;
      STATE = "idle";
      hideHint();
    }

    // Optionaler Callback
    if (onEnd && typeof onEnd === "function") onEnd();
  };

  // ✅ Sprachausgabe starten
  speechSynthesis.speak(u);
}
/* -----------------------------
   RESIZE
----------------------------- */
window.addEventListener("resize", () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});
