     BODY & GRUNDLAYOUT

console.log("SCRIPT START");
  
/* ==========================================
   MUSEUM STARTUP CLEANUP – SICHER & LOKAL (FIXED)
   ========================================== */

(function museumStartupCleanup() {
  try {
    console.log("[Museum] Startup cleanup begin");

    /* 1️⃣ Eigene Storage-Daten löschen */
    try {
      localStorage.clear();
      sessionStorage.clear();
      console.log("[Museum] localStorage & sessionStorage cleared");
    } catch (e) {
      try { console.warn("[Museum] Storage clear failed:", e); } catch {}
    }

    /* 2️⃣ IndexedDB vollständig löschen (Speech / Media-Reste) */
    try {
      if (window.indexedDB && typeof indexedDB.databases === "function") {
        indexedDB.databases()
          .then((dbs) => {
            (dbs || []).forEach((db) => {
              if (db && db.name) {
                try {
                  indexedDB.deleteDatabase(db.name);
                  console.log("[Museum] IndexedDB deleted:", db.name);
                } catch (e) {
                  try { console.warn("[Museum] IndexedDB delete failed:", db.name, e); } catch {}
                }
              }
            });
          })
          .catch((e) => {
            // auf manchen Plattformen nicht erlaubt/verfügbar
            try { console.warn("[Museum] indexedDB.databases() not available:", e); } catch {}
          });
      }
    } catch (e) {
      try { console.warn("[Museum] IndexedDB cleanup failed:", e); } catch {}
    }

    /* 3️⃣ Service Worker entfernen (falls jemals vorhanden) */
    try {
      if ("serviceWorker" in navigator && navigator.serviceWorker?.getRegistrations) {
        navigator.serviceWorker.getRegistrations()
          .then((regs) => {
            (regs || []).forEach((reg) => {
              try {
                reg.unregister();
                console.log("[Museum] ServiceWorker unregistered");
              } catch (e) {
                try { console.warn("[Museum] SW unregister failed:", e); } catch {}
              }
            });
          })
          .catch((e) => {
            try { console.warn("[Museum] getRegistrations() failed:", e); } catch {}
          });
      }
    } catch (e) {
      try { console.warn("[Museum] ServiceWorker cleanup failed:", e); } catch {}
    }

    /* 4️⃣ Harte Reset-Flags für Avatar-Logik */
    window.__MUSEUM_RESET__ = true;
    window.__MUSEUM_CLEANUP_DONE__ = true;

    console.log("[Museum] Startup cleanup done");
  } catch (err) {
    try { console.error("[Museum] Startup cleanup error:", err); } catch {}
  }
})();
  
/* ===============================

// === Voice-Auswahl (GLOBAL) – plattformsicher ===
let englishVoice = null;

function loadVoices() {
  try {
    if (!window.speechSynthesis || typeof speechSynthesis.getVoices !== "function") return;

    const voices = speechSynthesis.getVoices();
    if (!voices || !voices.length) return;

    const deVoices = voices.filter(v => (v.lang || "").toLowerCase().startsWith("de"));
    const enVoices = voices.filter(v => (v.lang || "").toLowerCase().startsWith("en"));

    // 🔹 DE: männlich bevorzugen (heuristisch über Name), dann Stefan, dann Google, dann irgendeine de
    maleVoice =
      deVoices.find(v => v.name && v.name.toLowerCase().includes("stefan")) ||
      deVoices.find(v => v.name && v.name.toLowerCase().includes("markus")) ||
      deVoices.find(v => v.name && v.name.toLowerCase().includes("männ")) ||
      null;

    germanVoice =
      maleVoice ||
      deVoices.find(v => v.name && v.name.toLowerCase().includes("stefan")) ||
      deVoices.find(v => v.name && v.name.toLowerCase().includes("google")) ||
      deVoices[0] ||
      null;

    // 🔹 EN: Google/David bevorzugen, sonst irgendeine en
    englishVoice =
      enVoices.find(v => v.name && v.name.toLowerCase().includes("google")) ||
      enVoices.find(v => v.name && v.name.toLowerCase().includes("david")) ||
      enVoices.find(v => (v.lang || "").toLowerCase() === "en-us") ||
      enVoices[0] ||
      null;

    console.log("🎤 Voices geladen:", {
      german:  germanVoice  ? `${germanVoice.name} (${germanVoice.lang})` : null,
      male:    maleVoice    ? `${maleVoice.name} (${maleVoice.lang})` : null,
      english: englishVoice ? `${englishVoice.name} (${englishVoice.lang})` : null
    });
  } catch (e) {
    try { console.warn("🎤 loadVoices failed:", e); } catch {}
  }
}

// Stimmen werden oft asynchron nachgeladen
try { speechSynthesis.onvoiceschanged = loadVoices; } catch (e) {}

// Sofortiger Versuch, falls Stimmen schon da sind

// === Bewegungszustände ===
let frontalFix = true;

let riseStartTime = 0;

let baseRotY = -0.35;

}

 // ===============================
// detectLanguage – GLOBAL (ROBUST v4: "was" = DE, stabile Fragewort-Regeln)
// ===============================
function detectLanguage(text) {
  const t0 = String(text || "").trim();
  if (!t0) return "de";
  const t = t0.toLowerCase();

  // harte DE-Indikatoren
  if (/[äöüß]/.test(t0)) return "de";

  // harte DE-Fragewörter am Satzanfang (entscheidend für Museum)
  if (/^(was|wer|wen|wem|wessen|wie|wo|wohin|woher|wann|warum|wieso|weshalb)\b/.test(t)) {
    return "de";
  }

  // harte EN-Indikatoren
  if (/\b(what|why|where|when|who|which|how|please)\b/.test(t)) return "en";
  if (/\b(i'm|you're|we're|they're|don't|can't|won't|it's)\b/.test(t)) return "en";

  // tokenisieren
  const tokens = t.split(/[^a-zA-Zäöüß]+/).filter(Boolean);

  // bewusst: KEIN "was" im EN-Set, weil das im Deutschen extrem häufig ist
  const en = new Set([
    "the","a","an","and","or","but",
    "is","are","were","do","does","did",
    "have","has","had","can","could","would","should","will","shall","may","might","must",
    "tell","explain","describe","show","give","talk","say","speak","think","know","mean",
    "about","history","life","death","war","battle","empire","king","emperor","rome","roman",
    "germany","italy","crusade","church",
    "thanks","thank","hello","hi","hey"
  ]);

  const de = new Set([
    "der","die","das","und","oder","aber",
    "was","wer","wie","wo","wann","warum","wieso","weshalb",
    "ist","sind","war","waren","bin","bist","seid",
    "ich","du","ihr","wir","sie","er","es","mein","dein","euer",
    "nicht","kein","keine","einen","eine","einem","einer",
    "habe","hast","hat","haben","habt","hatte","hatten",
    "kann","könnte","würde","soll","sollte","will","möchte","muss","müssen",
    "erzähle","erkläre","beschreibe","zeige","sage","sprich","nenne","heißt","bedeutet",
    "über","geschichte","leben","tod","krieg","schlacht","reich",
    "kaiser","könig","rom","deutschland","italien","kreuzzug","kirche",
    "bitte","danke","hallo","guten","tag"
  ]);
  
  let e = 0, d = 0;
  for (const w of tokens) {
    if (en.has(w)) e++;
    if (de.has(w)) d++;
  }

  // Endungen (leicht)
  if (/\b(ing|tion|ment|ness|ship|able)\b/.test(t)) e += 2;
  if (/\b(ung|keit|heit|chen|lein|schaft)\b/.test(t)) d += 2;

  if (e > d) return "en";
  return "de"; // Tie + Default: DE (Museum)
}
 // ===============================
// HINT-FUNKTIONEN (TEXT EIN-/AUSBLENDEN) – FIXED
// ===============================

function showHint(message) {
  try {
    const hintElement = document.getElementById("hint");
    if (!hintElement) return;

    if (typeof message === "string") {
      hintElement.innerText = message;
    }

    if (!hintElement.classList.contains("visible")) {
      hintElement.classList.add("visible");
    }
  } catch (e) {
    try { console.warn("showHint error:", e); } catch {}
  }
}

function hideHint() {
  try {
    const hintElement = document.getElementById("hint");
    if (!hintElement) return;

    if (hintElement.classList.contains("visible")) {
      hintElement.classList.remove("visible");
    }
  } catch (e) {
    try { console.warn("hideHint error:", e); } catch {}
  }
}

/* -----------------------------
   THREE.js SETUP – FIXED (MUSEUM-STABIL + GLOBAL VISEMEINDEX)
----------------------------- */

const scene = new THREE.Scene();

const camera = new THREE.PerspectiveCamera(

  window.innerWidth / window.innerHeight,

);
camera.position.set(0, 0, 2.8);

----------------------------- */

/* -----------------------------
   LICHT
----------------------------- */
const dirLight = new THREE.DirectionalLight(0xffffff, 2);
dirLight.position.set(1, 1, 2);
scene.add(dirLight);

const ambLight = new THREE.AmbientLight(0xffffff, 0.8);
scene.add(ambLight);

const frontLight = new THREE.PointLight(0xffffff, 0.8);
frontLight.position.set(0, 0.5, 2);

/* -----------------------------
   MODEL + VISEME
----------------------------- */

// globale Referenz (State-Machine nutzt sie)
visemeMesh = null;

// ✅ VISEME INDIZES GLOBAL, damit speak()/animate() in jedem Script-Tag darauf zugreifen können
window.visemeIndex = {
  A: 0,
  E: 1,
  O: 2,
  U: 3,
  M: 4
};

function isLikelyVisemeCarrier(obj) {
  const dict = obj?.morphTargetDictionary;
  if (!dict) return false;

  const keys = Object.keys(dict).map(k => k.toLowerCase());
  const hasA = keys.some(k => k.includes("viseme_a") || k === "a");
  const hasE = keys.some(k => k.includes("viseme_e") || k === "e");
  const hasO = keys.some(k => k.includes("viseme_o") || k === "o");
  const hasU = keys.some(k => k.includes("viseme_u") || k === "u");
  const hasM = keys.some(k => k.includes("viseme_m") || k === "m");
  return (hasA && hasE && hasO && hasU && hasM);
}

const loader = new THREE.GLTFLoader();
loader.load(
  "./avatar.glb",
  (gltf) => {
    model = gltf.scene;
    scene.add(model);

    let firstMorph = null;
    let best = null;

    model.traverse((obj) => {
      if ((obj.isMesh || obj.isSkinnedMesh) && obj.morphTargetDictionary && obj.morphTargetInfluences) {
        if (!firstMorph) firstMorph = obj;

        console.log("✔ MorphMesh gefunden:", obj.name, obj.morphTargetDictionary);

        if (!best && isLikelyVisemeCarrier(obj)) {
          best = obj;
        }
      }
    });

    visemeMesh = best || firstMorph || null;

    if (visemeMesh) {
      console.log("✔ Viseme-Träger gewählt:", visemeMesh.name);
    } else {
      console.error("❌ KEIN Viseme-Mesh gefunden – GLB prüfen!");
    }

    const loadingEl = document.getElementById("loading");
    if (loadingEl) loadingEl.style.display = "none";

    animate();
  },
  undefined,
  (err) => {
    console.error("❌ GLB load failed:", err);
    const loadingEl = document.getElementById("loading");
    if (loadingEl) loadingEl.innerText = "Fehler beim Laden des Avatars.";
  }
);

/* -----------------------------
   VISEME – NIEDRIGE EBENE
----------------------------- */
function setViseme(key, value) {
  if (!visemeMesh || !visemeMesh.morphTargetInfluences) return;

  const VI = window.visemeIndex;
  if (!VI) return;

  const idx = VI[key];
  if (idx === undefined) return;

  visemeMesh.morphTargetInfluences.fill(0);
  visemeMesh.morphTargetInfluences[idx] = value;
}
  
// ====================================
// ANIMATE – FINAL & STABIL (VISEME-KLON) – FIXED
// ====================================
function animate() {
  requestAnimationFrame(animate);
  if (!model) return;

  const now = performance.now();
  const frontalY = -Math.PI / 2;
  const rightY   = baseRotY - Math.PI / 2;
  const leftY    = frontalY + 0.25;

  // Mund-Ruhewert (muss zum speak()-baseClose passen)
  const MOUTH_REST = 0.04;

  /* ===============================
     🛑 MOUTH-COOLDOWN (HÖCHSTE PRIORITÄT)
     → verhindert Nachklappern
  =============================== */
  if (mouthCooldown) {
    setViseme("M", MOUTH_REST);
  }

  /* ===============================
     🧊 Mund neutral, wenn nicht gesprochen wird
     (NUR wenn KEIN Cooldown aktiv)
  =============================== */
  if (!mouthCooldown && !talking && STATE !== "think") {
    setViseme("M", MOUTH_REST);
  }

  /* ===============================
     THINK-PHASE → HMMM / NEIGEN
     (HÖCHSTE PRIORITÄT FÜR KOPF)
  =============================== */
  if (STATE === "think" && hmNeigen) {
    model.rotation.x = THREE.MathUtils.lerp(
      model.rotation.x,
      baseRotX + 0.25,
      0.04
    );
    model.rotation.y = THREE.MathUtils.lerp(
      model.rotation.y,
      leftY,
      0.04
    );

    renderer.render(scene, camera);
    return; // ⛔ nichts darf darüber hinwegzeichnen
  }

  /* ===============================
     GREET / ANSWER → FRONTAL
  =============================== */
  if (rising) {
    model.rotation.y = THREE.MathUtils.lerp(model.rotation.y, frontalY, 0.06);
    model.rotation.x = THREE.MathUtils.lerp(model.rotation.x, 0, 0.06);
  }

  /* ===============================
     TALKING / LISTEN / GREET → ATEM
  =============================== */
  else if (talking || STATE === "listen" || STATE === "greet") {
    model.position.y = baseY + Math.sin(now * 0.0015) * 0.008;
    model.rotation.y = THREE.MathUtils.lerp(model.rotation.y, frontalY, 0.03);
    model.rotation.x = THREE.MathUtils.lerp(model.rotation.x, 0, 0.03);
  }

  /* ===============================
     IDLE → SANFT NACH RECHTS + 🫁 ATEM
  =============================== */
  else if (STATE === "idle" && !recRunning && !talking) {
    const breath = Math.sin(now * 0.0019) * 0.006; // ~ ±2 mm
    model.position.y = baseY + breath;
    model.rotation.y = THREE.MathUtils.lerp(model.rotation.y, rightY, 0.03);
    model.rotation.x = THREE.MathUtils.lerp(model.rotation.x, baseRotX, 0.03);
  }

  /* ===============================
     DRIFT (NUR WENN NICHT THINK)
  =============================== */
  if (STATE !== "think") {
    const driftX = Math.sin(now * 0.0004) * 0.015;
    const driftY = Math.sin(now * 0.0003) * 0.012;

    model.rotation.x = THREE.MathUtils.lerp(
      model.rotation.x,
      baseRotX + driftX,
      0.02
    );

    const baseYaw = (STATE === "idle") ? rightY : frontalY;
    model.rotation.y = THREE.MathUtils.lerp(
      model.rotation.y,
      baseYaw + driftY,
      0.02
    );
  }

renderer.render(scene, camera);
}

function autoListenNextTurn(reason = "") {
  // nur in Dialog-Session automatisch weiter
  try {
    if (typeof SESSION_ACTIVE !== "undefined" && !SESSION_ACTIVE) return;
  } catch (e) { return; }

  // nur wenn gerade ruhig
  if (talking || recRunning) return;

  // nur aus passenden Zuständen
  if (STATE !== "greet" && STATE !== "answer" && STATE !== "think") return;

  // ganz kurze Entkopplung vom onend (Edge/Chrome sind sonst zickig)
  setTimeout(() => {
    // nochmal Guards
    if (talking || recRunning) return;
    if (STATE !== "greet" && STATE !== "answer") return;

    try { if (typeof hideHint === "function") hideHint(); } catch (e) {}

    lastTranscript = "";
    listeningFinished = false;
    STATE = "listen";

    startRecognition();

    // Guard: falls Recognition nicht startet → zurück zu greet + Hint
    setTimeout(() => {
      healIfStuck("autoListen-guard");
      if (STATE === "listen" && !recRunning) {
        STATE = "greet";
        resetMovements();
        try { showHint("Kurz Knopf drücken, dann in einem kurzen, vollständigen Satz fragen"); } catch (e) {}
      }
    }, 900);

  }, 180);
}
/* -----------------------------
   STATE MACHINE – RECOGNITION
   MIT THINK-PHASE (WAKE-SICHER) – FIXED v4.3
   (SERVER DECIDES LANGUAGE, CLIENT SENDS lang AS FALLBACK)
   + ✅ Gespräch beenden: Stop Listening + Reset auf Startzustand
   + ✅ kein Hängenbleiben nach Aufnahme
----------------------------- */

let recognition = null;
let heardSomething = false;

// detectedLanguage hilft der Engine (Recognition.lang),
// steuert aber NICHT direkt die Antwortsprache.
let detectedLanguage = "de";

let _recHandlersBound = false;
let _recSessionId = 0;
let _recAbortByUs = false;

// Stabilitäts-Guards
let _noSpeechCount = 0;
let _listenArmedAt = 0;
let _awaitingServer = false;

const NO_SPEECH_MAX_RETRIES = 2;
const NO_SPEECH_RETRY_MS    = 900;
const SILENCE_GRACE_MS      = 4500;

/* ===============================
   Kleine Safe-Helper
================================ */
function _safeSet(name, value) {
  try { globalThis[name] = value; } catch (e) {}
}

function _safeGet(name, fallback = undefined) {
  try {
    return (typeof globalThis[name] !== "undefined") ? globalThis[name] : fallback;
  } catch (e) {
    return fallback;
  }
}

/* ===============================
   Gespräch beenden
================================ */
function _normalizeTextForEndIntent(s) {
  return String(s || "")
    .toLowerCase()
    .trim()
    .replace(/[“”„"']/g, "")
    .replace(/[^\p{L}\p{N}\s-]/gu, " ")
    .replace(/\s+/g, " ")
    .trim();
}

function isEndConversationIntent(text) {
  const t = _normalizeTextForEndIntent(text);
  if (!t) return false;

  const de =
    (t.includes("gespräch") || t.includes("gespraech")) &&
    (
      t.includes("ist beendet") ||
      t.includes("beendet") ||
      t.includes("zu ende") ||
      t.includes("vorbei")
    );

  const en =
    (t.includes("conversation") || t.includes("talk") || t.includes("chat")) &&
    (
      t.includes("is over") ||
      t.includes("over") ||
      t.includes("ended") ||
      t.includes("finished") ||
      t.includes("is finished")
    );

  return !!(de || en);
}

function endConversation(reason = "user", langHint = "de") {
  try { console.log("🛑 Gespräch beendet:", reason); } catch (e) {}

  _recSessionId++;
  _awaitingServer = false;
  _noSpeechCount = 0;
  _listenArmedAt = 0;
  heardSomething = false;

  _safeSet("SESSION_ACTIVE", false);
  _safeSet("CONV_ID", null);
  _safeSet("SESSION_LAST_TS", Date.now());

  _safeSet("lastTranscript", "");
  _safeSet("listeningFinished", false);

  try {
    _recAbortByUs = true;
    if (recognition) recognition.abort();
  } catch (e) {}

  _safeSet("recRunning", false);
  _safeSet("greeted", false);
  _safeSet("STATE", "idle");

  try { resetMovements(); } catch (e) {}
  try {
    hmNeigen = false;
    rising = false;
  } catch (e) {}

  try {
    if (typeof model !== "undefined" && model) {
      model.position.y = baseY;
      model.rotation.x = baseRotX;
      model.rotation.y = baseRotY - Math.PI / 2;
    }
  } catch (e) {}

  try { hideHint(); } catch (e) {}

  const finalDe = "Verehrter Bürger der Neuzeit, ich danke für unseren anregenden Austausch.";
  const finalEn = "Honoured citizen of this modern age, I thank thee for our stirring exchange.";
  const finalText = (langHint === "en") ? finalEn : finalDe;

  try {
    if (!_safeGet("talking", false)) {
      speak(finalText, false, (langHint === "en") ? "en" : "de", () => {
        try { hideHint(); } catch (e) {}
        _safeSet("STATE", "idle");
      });
    }
  } catch (e) {}
}

/* ===============================
   SpeechRecognition verfügbar?
================================ */
function getSpeechRecognitionCtor() {
  return window.SpeechRecognition || window.webkitSpeechRecognition || null;
}

/* -----------------------------
   Recognition robust bereitstellen
----------------------------- */
function ensureRecognition() {
  const SR = getSpeechRecognitionCtor();
  if (!SR) return null;

  if (!recognition) {
    recognition = new SR();
    recognition.continuous = false;
    recognition.interimResults = false;
    recognition.maxAlternatives = 1;
    _recHandlersBound = false;
  }

  if (!_recHandlersBound) {
    _recHandlersBound = true;

    recognition.onresult = (e) => {
      if (_safeGet("STATE", "") !== "listen") return;

      const res = e?.results?.[0]?.[0]?.transcript;
      if (!res || !res.trim()) return;

      const clean = res.trim();
      _safeSet("lastTranscript", clean);

      detectedLanguage =
        (typeof detectLanguage === "function")
          ? detectLanguage(clean)
          : "de";

      heardSomething = true;
      _noSpeechCount = 0;

      try { console.log("📝 onresult:", clean); } catch (e) {}

      if (isEndConversationIntent(clean)) {
        endConversation("intent-detected", detectedLanguage);
        return;
      }
    };

    recognition.onerror = (e) => {
      const err = e?.error || e;
      try { console.warn("🎙️ recognition.onerror:", err); } catch (x) {}

      if (_safeGet("STATE", "") !== "listen") return;

      if (err === "no-speech") {
        _noSpeechCount++;

        const sinceArm = performance.now() - (_listenArmedAt || 0);
        if (sinceArm < SILENCE_GRACE_MS) return;

        if (_noSpeechCount <= NO_SPEECH_MAX_RETRIES) {
          _recAbortByUs = true;
          try { recognition.abort(); } catch (e2) {}

          setTimeout(() => {
            if (_safeGet("STATE", "") !== "listen") return;
            if (_safeGet("talking", false) || _safeGet("recRunning", false)) return;
            try { startRecognition(); } catch (e3) {}
          }, NO_SPEECH_RETRY_MS);

          return;
        }

        _safeSet("recRunning", false);
        _safeSet("STATE", "greet");
        _safeSet("greeted", true);
        try { showHint("Kurz Knopf drücken, dann in einem vollständigen Satz fragen"); } catch (e2) {}
        return;
      }

      // andere Fehler -> sauber zurück
      _safeSet("recRunning", false);
      _safeSet("STATE", "greet");
      try { showHint("Kurz Knopf drücken, dann fragen"); } catch (e2) {}
    };

    recognition.onend = () => {
      _safeSet("recRunning", false);

      if (_recAbortByUs) {
        _recAbortByUs = false;
        return;
      }

      if (_safeGet("STATE", "") !== "listen") return;

      const transcript = _safeGet("lastTranscript", "");

      // ===== 1) NICHTS GEHÖRT =====
      if (!heardSomething || !transcript) {
        const sinceArm = performance.now() - (_listenArmedAt || 0);

        if (sinceArm < SILENCE_GRACE_MS) {
          if (_safeGet("SESSION_ACTIVE", false)) {
            try { console.log("🕳️ Stille (kurz) – höre weiter…"); } catch (e) {}
            setTimeout(() => {
              if (_safeGet("STATE", "") !== "listen") return;
              if (_safeGet("talking", false) || _safeGet("recRunning", false)) return;
              startRecognition();
            }, 650);
            return;
          }

          _safeSet("STATE", "greet");
          try { showHint("Kurz Knopf drücken, dann fragen"); } catch (e) {}
          return;
        }

        if (_safeGet("SESSION_ACTIVE", false)) {
          try { console.log("🕳️ Stille erkannt – höre weiter…"); } catch (e) {}
          setTimeout(() => {
            if (_safeGet("STATE", "") !== "listen") return;
            if (_safeGet("talking", false) || _safeGet("recRunning", false)) return;
            _safeSet("lastTranscript", "");
            _safeSet("listeningFinished", false);
            startRecognition();
          }, 900);
          return;
        }

        _safeSet("STATE", "greet");
        try { showHint("Kurz Knopf drücken, dann fragen"); } catch (e) {}
        return;
      }

      // ===== 2) ENDE-INTENT =====
      if (isEndConversationIntent(transcript)) {
        endConversation("intent-onend", detectedLanguage);
        return;
      }

      // ===== 3) ETWAS GEHÖRT → THINK + FETCH =====
      _safeSet("STATE", "think");
      _awaitingServer = true;

      try { resetMovements(); } catch (e) {}

      requestAnimationFrame(() => {
        try {
          hmNeigen = true;
          hmStartTime = performance.now();
        } catch (e) {}
      });

      const thinkPhrase =
        (detectedLanguage === "en")
          ? "One moment, please."
          : "Ähm … einen Moment bitte.";

      const THINK_DELAY_MS   = 1800;
      const MIN_THINK_GAP_MS = 450;

      let thinkTimer = null;
      let thinkStartedAt = 0;
      let thinkWasSpoken = false;

      thinkTimer = setTimeout(() => {
        if (_safeGet("STATE", "") !== "think") return;
        if (_safeGet("talking", false)) return;
        if (!_awaitingServer) return;

        thinkWasSpoken = true;
        thinkStartedAt = Date.now();

        try {
          speak(thinkPhrase, true, (detectedLanguage === "en") ? "en" : "de");
        } catch (e) {}
      }, THINK_DELAY_MS);

      try {
        if (_safeGet("SESSION_ACTIVE", false)) {
          _safeSet("SESSION_LAST_TS", Date.now());
        }
      } catch (e) {}

      try { console.log("📨 sende an /ask:", transcript); } catch (e) {}

      fetch("/ask", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          text: transcript,
          lang: detectedLanguage,
          conversationId: _safeGet("CONV_ID", null)
        })
      })
        .then(async (r) => {
          const rawText = await r.text();

          if (!r.ok) {
            throw new Error(`HTTP ${r.status}: ${rawText}`);
          }

          let data = null;
          try {
            data = JSON.parse(rawText);
          } catch (parseErr) {
            throw new Error("Ungültiges JSON von /ask: " + rawText);
          }

          return data;
        })
        .then((data) => {
          _awaitingServer = false;

          if (thinkTimer) {
            clearTimeout(thinkTimer);
            thinkTimer = null;
          }

          const extraDelay =
            (thinkWasSpoken && thinkStartedAt)
              ? Math.max(0, MIN_THINK_GAP_MS - (Date.now() - thinkStartedAt))
              : 0;

          const proceed = () => {
            const waitForThinkEnd = setInterval(() => {
              if (!_safeGet("talking", false)) {
                clearInterval(waitForThinkEnd);

                _safeSet("STATE", "answer");
                try { resetMovements(); } catch (e) {}

                try {
                  rising = true;
                  riseStartTime = performance.now();
                } catch (e) {}

                let answerLang = "de";
                if (data && (data.answerLang === "en" || data.answerLang === "de")) {
                  answerLang = data.answerLang;
                }

                detectedLanguage = answerLang;

                const answerText =
                  (data && typeof data.answer === "string" && data.answer.trim())
                    ? data.answer.trim()
                    : "Verzeiht, ich habe darauf im Augenblick keine gute Antwort.";

                try { console.log("✅ Antwort von /ask:", answerText); } catch (e) {}

                try {
                  speak(answerText, false, answerLang);
                } catch (speakErr) {
                  console.warn("❌ speak() Fehler:", speakErr);
                  _safeSet("STATE", "greet");
                  try { showHint("Kurz Knopf drücken, dann fragen"); } catch (e) {}
                }
              }
            }, 120);
          };

          if (extraDelay > 0) setTimeout(proceed, extraDelay);
          else proceed();
        })
        .catch((err) => {
          _awaitingServer = false;

          if (thinkTimer) {
            clearTimeout(thinkTimer);
            thinkTimer = null;
          }

          try { console.warn("❌ /ask Fehler:", err); } catch (e) {}

          _safeSet("STATE", "answer");
          try { resetMovements(); } catch (e) {}

          try {
            speak(
              "Verzeiht, es gab ein Problem bei meiner Antwort.",
              false,
              "de"
            );
          } catch (e) {
            _safeSet("STATE", "greet");
            try { showHint("Kurz Knopf drücken, dann fragen"); } catch (e2) {}
          }
        });
    };
  }

  return recognition;
}

function startRecognition() {
  const r = ensureRecognition();
  if (!r) {
    try { console.warn("🛑 SpeechRecognition nicht verfügbar."); } catch (e) {}
    _safeSet("recRunning", false);
    return;
  }

  r.lang = (detectedLanguage === "en") ? "en-US" : "de-DE";
  _recSessionId++;

  heardSomething = false;
  _safeSet("lastTranscript", "");
  _listenArmedAt = performance.now();

  if (_safeGet("recRunning", false)) {
    _recAbortByUs = true;
    try { r.abort(); } catch (e) {}
    _safeSet("recRunning", false);
  }

  _safeSet("recRunning", true);

  try {
    r.start();
    try { console.log("🎙️ Recognition gestartet:", r.lang); } catch (e) {}
  } catch (e) {
    _safeSet("recRunning", false);
    try { console.warn("🛑 Recognition start() fehlgeschlagen, retry…", e); } catch (x) {}

    setTimeout(() => {
      if (_safeGet("STATE", "") !== "listen") return;

      const rr = ensureRecognition();
      if (!rr) return;

      rr.lang = (detectedLanguage === "en") ? "en-US" : "de-DE";
      heardSomething = false;
      _safeSet("lastTranscript", "");
      _listenArmedAt = performance.now();

      _safeSet("recRunning", true);

      try {
        rr.start();
        try { console.log("🎙️ Recognition retry gestartet:", rr.lang); } catch (e2) {}
      } catch (e2) {
        _safeSet("recRunning", false);
        try { console.warn("🛑 Recognition retry start() fehlgeschlagen:", e2); } catch (x2) {}
        _safeSet("STATE", "greet");
        try { showHint("Kurz Knopf drücken, dann fragen"); } catch (e3) {}
      }
    }, 250);
  }
}
/* -----------------------------
   BUTTON + ENTER – GREET & LISTEN
   STABIL – FIXED v3.3 (NO LISTEN RACE / REVIEWED)
----------------------------- */

const micBtn = document.getElementById("micBtn");
if (!micBtn) {
  console.warn("❌ micBtn nicht gefunden – Button-Block wird übersprungen");
} else {

  // verhindert Mehrfach-Bindung
  if (!window._interactionBound) {
    window._interactionBound = true;

    micBtn.onclick = startInteraction;

    // Enter im Capture-Mode → kann nicht geschluckt werden
    document.addEventListener("keydown", (e) => {
      if (e.key !== "Enter") return;
      if (e.repeat) return; // 🔒 verhindert "Enter gehalten" / Prellen
      e.preventDefault();
      e.stopPropagation();
      startInteraction();
    }, true);
  }

  /* ===============================
     🔧 RESYNC: nur harmlose Desyncs heilen
     WICHTIG:
     - KEIN STATE-Umbiegen während listen
     - KEIN listen-start-guard mehr
  ================================ */
  let _lastHealAt = 0;

  function healIfStuck(tag = "") {
    const now = performance.now();
    if (now - _lastHealAt < 200) return;
    _lastHealAt = now;

    // talking-Desync heilen
    try {
      const speaking = !!(window.speechSynthesis && speechSynthesis.speaking);
      if (!speaking && typeof talking !== "undefined" && talking) {
        console.warn("🩹 heal:", tag, "talking=true aber speechSynthesis.speaking=false → talking=false");
        talking = false;
      }
    } catch (e) {}

    // recRunning nur dann heilen, wenn recognition wirklich fehlt
    try {
      if (
        typeof recRunning !== "undefined" &&
        recRunning &&
        (typeof recognition === "undefined" || !recognition)
      ) {
        console.warn("🩹 heal:", tag, "recRunning=true aber recognition fehlt → recRunning=false");
        recRunning = false;
      }
    } catch (e) {}
  }

  function startInteraction() {
    healIfStuck("enter/click");

    // keine parallelen Aktionen
    if (
      (typeof talking !== "undefined" && talking) ||
      (typeof recRunning !== "undefined" && recRunning)
    ) return;

    // während think/answer nichts triggern
    if (STATE === "think" || STATE === "answer") return;

    // wenn listen noch aktiv ist, ignorieren
    if (STATE === "listen") return;

    // Doppelklick-Schutz / Tasterprellen
    if (typeof buttonLocked !== "undefined" && buttonLocked) return;
    buttonLocked = true;
    setTimeout(() => { buttonLocked = false; }, 350);

    /* ===============================
         1️⃣ IDLE → GREET
    =============================== */
    if (STATE === "idle" && !greeted) {

      // === 🔹 DIALOG SESSION START (SAFE) ===
      try {
        if (typeof SESSION_ACTIVE === "undefined") window.SESSION_ACTIVE = false;
        if (typeof SESSION_LAST_TS === "undefined") window.SESSION_LAST_TS = 0;
        if (typeof CONV_ID === "undefined") window.CONV_ID = null;
      } catch (e) {}

      try {
        if (!SESSION_ACTIVE) {
          SESSION_ACTIVE = true;
          SESSION_LAST_TS = Date.now();

          if (typeof createConversationId === "function") {
            CONV_ID = createConversationId();
          } else {
            CONV_ID = `conv_${Date.now()}_${Math.random().toString(16).slice(2)}`;
          }

          try { console.log("🗣️ Neue Dialog-Session:", CONV_ID); } catch (e) {}
        }
      } catch (e) {}

      // Voice-Warmup
      try {
        const voicesReady =
          typeof speechSynthesis !== "undefined" &&
          typeof speechSynthesis.getVoices === "function" &&
          speechSynthesis.getVoices().length > 0;

        if (!voicesReady) {
          setTimeout(() => startInteraction(), 150);
          return;
        }
      } catch (e) {}

      greeted = true;
      STATE = "greet";

      try { resetMovements(); } catch (e) {}

      frontalFix = false;
      rising = true;
      riseStartTime = performance.now();

      try {
        if (typeof recognition !== "undefined" && recognition) {
          recognition.abort();
        }
      } catch (e) {}

      recRunning = false;
      listeningFinished = false;
      lastTranscript = "";

      speak(
        "Seid gegrüßt, mein Freund. Ich bin Friedrich Barbarossa, nach fast neunhundert Jahren im Kaiserberg zu Lautern erwacht. Was ist Euer Begehr? Nennt mir gern Euren edlen Namen. If you want, you can also ask in English.",
        false,
        "de",
        () => {
          try { showHint("Kurz Knopf drücken, dann fragen"); } catch (e) {}
        }
      );

      // Auto-Reset nach 2 Minuten
      if (typeof greetTimeout !== "undefined" && greetTimeout) {
        clearTimeout(greetTimeout);
      }

      greetTimeout = setTimeout(() => {
        healIfStuck("greet-timeout-check");

        if (STATE === "greet" && !recRunning && !talking) {
          try { console.log("⏳ Begrüßung ohne Reaktion – Reset auf Startzustand"); } catch (e) {}

          try { resetMovements(); } catch (e) {}
          greeted = false;
          lastTranscript = "";
          listeningFinished = false;
          STATE = "idle";

          try { hideHint(); } catch (e) {}

          try {
            SESSION_ACTIVE = false;
            CONV_ID = null;
          } catch (e) {}

          try {
            if (model) {
              model.position.y = baseY;
              model.rotation.x = baseRotX;
              model.rotation.y = baseRotY - Math.PI / 2;
            }
          } catch (e) {}
        }
      }, 120000);

      return;
    }

    /* ===============================
         2️⃣ GREET → LISTEN
    =============================== */
    if (STATE === "greet" && !recRunning) {
      const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
      if (!SR) {
        alert("Spracherkennung wird von diesem Browser nicht unterstützt.");
        return;
      }

      try {
        if (typeof SESSION_ACTIVE !== "undefined" && SESSION_ACTIVE) {
          SESSION_LAST_TS = Date.now();
        }
      } catch (e) {}

      try { hideHint(); } catch (e) {}

      if (typeof greetTimeout !== "undefined" && greetTimeout) {
        clearTimeout(greetTimeout);
        greetTimeout = null;
      }

      lastTranscript = "";
      listeningFinished = false;
      STATE = "listen";

      startRecognition();

      // ✅ KEIN zusätzlicher Fallback-Timer hier
      // Der Recognition-Block steuert alleine,
      // ob bei Stille weitergehört oder auf greet zurückgegangen wird.

      return;
    }
  }
}

/* ===============================
   HINT-FUNKTIONEN (lokal)
   (wenn du bereits globale showHint/hideHint hast, diesen Block NICHT doppelt führen)
================================ */

function hideHint() {
  try {
    const hintElement = document.getElementById("hint");
    if (!hintElement) return;

    hintElement.classList.remove("visible");
    hintElement.innerText = "";
  } catch (e) {
    try { console.warn("hideHint error:", e); } catch {}
  }
}
/* ===============================
   🏛️ MUSEUMS-RESET (PASSIV & SICHER) – FIXED (COMPAT)
================================ */

function museumReset(reason = "") {
  console.log("🛡️ Museum-Reset:", reason);

  // ❌ Niemals während aktiver Nutzung eingreifen
  // Reset ist erlaubt in idle/greet, aber nicht wenn aktiv gesprochen/gehört wird
  const quietState = (STATE === "idle" || STATE === "greet");
  if (!quietState || talking || recRunning) {
    console.log("⛔ Reset abgebrochen – System aktiv");
    return;
  }

  // --- Timer aufräumen (wichtig gegen Spät-Zündungen) ---
  try {
    if (greetTimeout) {
      clearTimeout(greetTimeout);
      greetTimeout = null;
    }
  } catch (e) {}

  // --- Speech sicher beenden ---
  try { speechSynthesis.cancel(); } catch (e) {}
  // Hard-Cleanup: falls Speech hing
  talking = false;

  // --- Recognition hart beenden ---
  try { recognition?.abort(); } catch (e) {}
  recRunning = false;
  recognition = null;

  // Recognition wieder bereitstellen, falls Funktion vorhanden
  try {
    if (typeof ensureRecognition === "function") ensureRecognition();
  } catch (e) {}

  // --- Bewegungen vollständig neutralisieren ---
  resetMovements();

  // --- Transcript löschen ---
  lastTranscript = "";

  // --- Viseme neutral (Mund-Ruhe konsistent) ---
  try {
    if (typeof setViseme === "function") {
      const MOUTH_REST = 0.04;
      setViseme("M", MOUTH_REST);
    }
  } catch (e) {}

  // --- Avatar in definierte Ruhepose ---
  if (model) {
    model.position.y = baseY;
    model.rotation.x = baseRotX;
    model.rotation.y = baseRotY - Math.PI / 2;
  }

  // ✅ Hinweistext nach Reset anzeigen
  showHint("Kurz Knopf drücken, dann in einem kurzen, vollständigen Satz fragen");

  console.log("🟢 Museum-Reset abgeschlossen");
}

/* ===============================
   🔁 MUSEUMS-TRIGGER – FIXED
   (NUR WEG → ZURÜCK, ENTSPRELLT)
================================ */

let _lastVisState = document.visibilityState;
let _lastVisResetAt = 0;

document.addEventListener("visibilitychange", () => {
  const cur = document.visibilityState;
  const now = performance.now();

  // Nur wenn wir wirklich zurückkommen: hidden -> visible
  const cameBack = (_lastVisState === "hidden" && cur === "visible");
  _lastVisState = cur;
  if (!cameBack) return;

  // Entprellen (Chrome kann mehrfach feuern)
  if (now - _lastVisResetAt < 3000) return;
  _lastVisResetAt = now;

  // Reset nur wenn wirklich "ruhig"
  if ((STATE === "idle" || STATE === "greet") && !talking && !recRunning) {
    museumReset("visibilitychange (back)");
  }
});
  
/* -----------------------------
   SPEAK – FINAL (VISEME-STABIL) – FIXED v3 (DIALOG-SAFE)
   (SERVER LANG PRIO + EN OFFLINE-VOICE + cancelt nur wenn speaking/pending)
----------------------------- */
function speak(text, slow = false, forceLang = null, onEnd = null) {

  // Queue nur leeren, wenn wirklich noch etwas läuft (reduziert Cut-offs)
  try {
    if (window.speechSynthesis && (speechSynthesis.speaking || speechSynthesis.pending)) {
      speechSynthesis.cancel();
    }
  } catch (e) {}

  const u = new SpeechSynthesisUtterance(text);

  // Sprache bestimmen: forceLang (vom Server) hat Priorität, sonst museum-default "de"
  const lang = (forceLang === "en") ? "en" : "de";
  u.lang = (lang === "en") ? "en-US" : "de-DE";

  // Stimme setzen (DE: maleVoice priorisiert)
  if (lang === "en") {
    let v = (typeof englishVoice !== "undefined" && englishVoice) ? englishVoice : null;

    const isOnline = (name) => /Online/i.test(name || "");
    const isAva = (name) => /\bAva\b/i.test(name || "");

    // Ava oder Online grundsätzlich NICHT erlauben
    if (v && (isOnline(v.name) || isAva(v.name))) {
      v = null;
    }

    if (!v) {
      const voices = speechSynthesis.getVoices();

      // Nur OFFLINE englische Stimmen zulassen (nicht Online, nicht Ava)
      const fallback =
        voices.find(x =>
          x.lang === "en-US" &&
          !isOnline(x.name) &&
          !isAva(x.name)
        ) ||
        voices.find(x =>
          (x.lang || "").startsWith("en") &&
          !isOnline(x.name) &&
          !isAva(x.name)
        ) ||
        null;

      if (fallback) v = fallback;
    }

    u.voice = v || null;

  } else {
    const mv = (typeof maleVoice !== "undefined" && maleVoice) ? maleVoice : null;
    const gv = (typeof germanVoice !== "undefined" && germanVoice) ? germanVoice : null;
    u.voice = mv || gv || null;
  }

  // Pitch/Rate
  u.pitch = 1.0;
  u.rate  = (lang === "en") ? 0.92 : (slow ? 0.85 : 1.0);

  const isGreeting = (STATE === "greet");

  let timer = null;
  let active = false;
  let preEndTimer = null;

  let finalized = false;
  let failSafeTimer = null;

  const stepMs = slow ? 135 : 95;
  const lerpFactor = 0.42;
  const baseClose = 0.04;

  const VI = (typeof visemeIndex !== "undefined" && visemeIndex)
    ? visemeIndex
    : (window.visemeIndex || null);

  function hardStopToRest() {
    active = false;

    if (timer) {
      clearInterval(timer);
      timer = null;
    }

    if (!visemeMesh || !visemeMesh.morphTargetInfluences) return;

    visemeMesh.morphTargetInfluences.fill(0);
    try {
      if (VI && typeof VI.M !== "undefined") {
        visemeMesh.morphTargetInfluences[VI.M] = baseClose;
      }
    } catch (e) {}
  }

  function chooseNextViseme() {
    const r = Math.random();
    if (r < 0.42) return "A";
    if (r < 0.68) return "U";
    if (r < 0.84) return "E";
    return "O";
  }

  function startVisemes() {
    if (active || !visemeMesh || !visemeMesh.morphTargetInfluences) return;
    if (!VI) return;

    active = true;
    let targetIdx = VI[chooseNextViseme()];

    timer = setInterval(() => {
      if (!active) return;

      if (Math.random() < 0.5) {
        targetIdx = VI[chooseNextViseme()];
      }

      let target = 0.5 + Math.random() * 0.2;

      const key = Object.keys(VI).find(k => VI[k] === targetIdx);
      if (key === "O") target *= 0.65;
      if (key === "E") target *= 0.75;

      const inf = visemeMesh.morphTargetInfluences;
      for (let i = 0; i < inf.length; i++) {
        const desired = (i === targetIdx) ? target : baseClose;
        inf[i] += (desired - inf[i]) * lerpFactor;
      }
    }, stepMs);
  }

  // ✅ bessere Dauer-Schätzung: Wörter statt Zeichen (deutlich näher an TTS)
  function estimateSpeechDurationMs(text, slow) {
    const t = String(text || "").trim();
    if (!t) return 2000;

    const words = t.split(/\s+/).filter(Boolean).length;

    // konservativ (lieber zu lang als zu kurz, sonst wird abgeschnitten)
    const wps = slow ? 1.6 : 2.1; // words per second
    const base = (words / wps) * 1000;

    // Puffer für Pausen/Satzzeichen/Chrome-Latenz
    return base + 6000;
  }

  function finalizeOnce(reason = "onend") {
    if (finalized) return;
    finalized = true;

    if (preEndTimer) {
      clearTimeout(preEndTimer);
      preEndTimer = null;
    }
    if (failSafeTimer) {
      clearTimeout(failSafeTimer);
      failSafeTimer = null;
    }

    hardStopToRest();
    talking = false;

    // Dialog: Aktivität aktualisieren (verhindert Timeout direkt nach Antwort)
    try {
      if (typeof SESSION_ACTIVE !== "undefined" && SESSION_ACTIVE) {
        SESSION_LAST_TS = Date.now();
      }
    } catch (e) {}

    mouthCooldown = true;
    setTimeout(() => { mouthCooldown = false; }, 120);

    if (STATE === "greet") {
      if (typeof showHint === "function") {
        showHint("Kurz Knopf drücken, dann in einem kurzen, vollständigen Satz fragen");
      }
    }

    if (STATE === "answer") {
  resetMovements();
  hmNeigen = false;
  rising = false;

  const endedNow = !!(window._SESSION_ENDED === true);

  // ✅ Wenn Server das Gespräch beendet hat: NICHT auto-listen, zurück in idle
  if (endedNow) {
    try { window._SESSION_ENDED = false; } catch (e) {}
    greeted = false;
    STATE = "idle";
    try { if (typeof hideHint === "function") hideHint(); } catch (e) {}
  }
  // ✅ DIALOG: nach Antwort in greet bleiben (Session aktiv), dann automatisch weiter zuhören
  else if (typeof SESSION_ACTIVE !== "undefined" && SESSION_ACTIVE) {
    STATE = "greet";
    greeted = true;

    try { if (typeof showHint === "function") showHint("Ich höre zu …"); } catch (e) {}

    // 🔥 jetzt automatisch nächste Eingabe starten (ohne Enter)
    autoListenNextTurn("after-answer");
  } else {
    greeted = false;
    STATE = "idle";
    if (typeof hideHint === "function") hideHint();
  }
}

    if (onEnd && typeof onEnd === "function") {
      try { onEnd(); } catch (e) {}
    }

    try {
      if (reason !== "onend") console.warn("🛟 speak() finalized via", reason);
    } catch (e) {}
  }

  u.onstart = () => {
    talking = true;
    hardStopToRest();
    startVisemes();

    // Visemes kurz vor Ende schließen (nur Mund, nicht Speech!)
    const PRE_END_STOP_MS = 700;
    const estimated = estimateSpeechDurationMs(text, slow);

    preEndTimer = setTimeout(() => {
      hardStopToRest();
    }, Math.max(0, estimated - PRE_END_STOP_MS));
  };

  u.onboundary = (e) => {
    if (isGreeting) return;
    if (!active || !e || typeof e.charIndex !== "number") return;

    const ch = String(text || "")[e.charIndex];
    if (",;:".includes(ch)) {
      active = false;
      setTimeout(() => startVisemes(), 90);
    }
    if (".!?".includes(ch)) {
      active = false;
    }
  };

  u.onend   = () => finalizeOnce("onend");
  u.onerror = () => finalizeOnce("onerror");

  // ✅ FAILSAFE (viel großzügiger) – cancelt NUR wenn wirklich noch gesprochen wird
  const est = estimateSpeechDurationMs(text, slow);
  const FAILSAFE_MS = Math.min(120000, Math.max(12000, est)); // 12s–120s

  failSafeTimer = setTimeout(() => {
    try {
      const stillSpeaking = window.speechSynthesis && speechSynthesis.speaking;
      if (stillSpeaking) {
        try { speechSynthesis.cancel(); } catch (e) {}
      }
    } catch (e) {}
    finalizeOnce("failsafe-timeout");
  }, FAILSAFE_MS);

  try {
    if (window.speechSynthesis && typeof speechSynthesis.speak === "function") {
      speechSynthesis.speak(u);
    } else {
      finalizeOnce("no-speechSynthesis");
    }
  } catch (e) {
    finalizeOnce("speak-throw");
  }
}
</script>
</body>
</html>
